<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civic Pulse</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap');
  :root{
    --ink:#1c2b28; --paper:#f0ece1; --paper-dim:#e6e0d0; --teal:#2d5d5a; --teal-deep:#163634;
    --ochre:#b5793a; --rust:#a8462f; --purple:#6b4a8a; --olive:#7a6a3a; --blue:#3d6b8a; --line:#c9c0a8;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--paper); color:var(--ink); font-family:'Source Sans 3',sans-serif; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:1140px; margin:0 auto; padding:24px 18px 80px; }
  header{ border-bottom:2px solid var(--ink); padding-bottom:16px; margin-bottom:16px; position:relative; }
  .lang-toggle{ position:absolute; top:0; right:0; display:flex; border:1.5px solid var(--ink); border-radius:20px; overflow:hidden; }
  .lang-toggle button{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.05em; padding:6px 12px; border:none; background:transparent; color:var(--ink); cursor:pointer; }
  .lang-toggle button.active{ background:var(--teal-deep); color:var(--paper); }
  .eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--teal); margin:0 0 6px; padding-right:90px; }
  h1{ font-family:'Fraunces',serif; font-weight:600; font-size:clamp(22px,5vw,34px); margin:0 0 8px; line-height:1.08; color:var(--teal-deep); padding-right:10px; }
  .lede{ max-width:760px; font-size:13.5px; line-height:1.55; color:#3d4a45; margin:0 0 8px; }
  .legend-btn{ font-family:'IBM Plex Mono',monospace; font-size:11px; padding:6px 12px; border:1.5px solid var(--teal); background:transparent; color:var(--teal); border-radius:20px; cursor:pointer; }
  .legend-btn:hover{ background:var(--teal); color:var(--paper); }
  .legend-panel{ display:none; margin-top:12px; background:#fff; border:1px solid var(--line); border-radius:6px; padding:14px 16px; }
  .legend-panel.open{ display:block; }
  .legend-row{ display:grid; grid-template-columns:130px 140px 1fr; gap:10px; padding:7px 0; border-bottom:1px solid var(--paper-dim); font-size:12px; align-items:baseline; }
  .legend-row:last-child{ border-bottom:none; }
  .legend-dim{ font-family:'IBM Plex Mono',monospace; font-weight:600; }
  .legend-src{ color:#8a8272; font-size:11px; }

  .tabs{ display:flex; gap:4px; margin:18px 0 16px; border-bottom:1px solid var(--line); }
  .tab{ font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.03em; padding:9px 16px; border:none; background:transparent; color:#8a8272; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .tab.active{ color:var(--teal-deep); border-bottom-color:var(--teal-deep); font-weight:600; }
  .view{ display:none; }
  .view.active{ display:block; }

  /* Overview */
  .summary-strip{ margin-bottom:22px; }
  .summary-title{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:#8a8272; margin-bottom:8px; }
  .stack-bar{ display:flex; height:28px; border-radius:5px; overflow:hidden; border:1px solid var(--line); }
  .stack-seg{ display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#fff; min-width:2px; white-space:nowrap; overflow:hidden; }
  .stack-legend{ display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
  .stack-legend-item{ display:flex; align-items:center; gap:5px; font-size:11px; font-family:'IBM Plex Mono',monospace; }
  .swatch{ width:10px; height:10px; border-radius:2px; display:inline-block; }

  .map-controls{ display:flex; justify-content:space-between; align-items:center; margin:20px 0 10px; flex-wrap:wrap; gap:8px; }
  .map-note{ font-size:11.5px; color:#8a8272; max-width:520px; }
  .continent-block{ margin-bottom:18px; }
  .continent-label{ font-family:'Fraunces',serif; font-weight:600; font-size:14px; color:var(--teal-deep); margin-bottom:6px; }
  .tile-grid{ display:flex; flex-wrap:wrap; gap:3px; }
  .tile{ width:34px; height:34px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:9px; color:#fff; cursor:pointer; opacity:.92; transition:transform .1s, opacity .1s; }
  .tile:hover{ transform:scale(1.12); opacity:1; z-index:2; }

  /* Browse */
  .controls{ display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 4px; align-items:center; }
  .control-group{ display:flex; flex-wrap:wrap; gap:6px; }
  .control-label{ font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:#8a8272; margin-right:4px; align-self:center; }
  .controls input[type="text"]{ font-family:'IBM Plex Mono',monospace; font-size:13px; padding:9px 12px; border:1.5px solid var(--ink); background:var(--paper); color:var(--ink); border-radius:3px; flex:1 1 200px; min-width:160px; }
  .chip{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.02em; padding:6px 10px; border:1.5px solid var(--line); background:transparent; color:var(--ink); border-radius:20px; cursor:pointer; white-space:nowrap; }
  .chip:hover{ border-color:var(--teal); }
  .chip.active{ background:var(--teal-deep); border-color:var(--teal-deep); color:var(--paper); }
  .count{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6b6455; margin:14px 0 10px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:10px; }
  .card{ background:#fff; border:1px solid var(--line); border-left:4px solid var(--ochre); border-radius:4px; padding:12px 14px; cursor:pointer; transition:transform .12s,box-shadow .12s; }
  .card:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(28,43,40,.08); }
  .card-top{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .country{ font-family:'Fraunces',serif; font-weight:600; font-size:16px; color:var(--teal-deep); }
  .region{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:#8a8272; text-transform:uppercase; letter-spacing:.06em; }
  .regime{ font-size:11.5px; color:#55564f; margin:5px 0 8px; }
  .regime b{ color:var(--ink); font-weight:600; }
  .issue-tag{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10px; padding:3px 8px; border-radius:20px; background:var(--paper-dim); color:var(--ink); margin-bottom:8px; }
  .bars{ display:flex; flex-direction:column; gap:3px; margin-top:6px; }
  .bar-row{ display:flex; align-items:center; gap:6px; }
  .bar-label{ font-family:'IBM Plex Mono',monospace; font-size:9px; color:#8a8272; width:34px; flex-shrink:0; }
  .bar-track{ flex:1; height:5px; background:var(--paper-dim); border-radius:3px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:3px; }
  .clickable-bar{ cursor:pointer; border-radius:3px; padding:2px 3px; margin:0 -3px; transition:background .12s; }
  .clickable-bar:hover{ background:var(--paper-dim); }
  .clickable-bar:hover .bar-label{ color:var(--teal-deep); font-weight:600; }
  .expand-hint{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:#a39c86; margin-top:6px; }
  .card-detail{ display:none; margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); }
  .card.expanded .card-detail{ display:block; }
  .card.expanded .expand-hint{ display:none; }
  .empty{ grid-column:1/-1; text-align:center; padding:40px 10px; color:#8a8272; font-family:'IBM Plex Mono',monospace; font-size:13px; }

  /* Rankings */
  .rank-controls{ margin:10px 0 16px; }
  .rank-list{ display:flex; flex-direction:column; gap:4px; }
  .rank-row{ display:grid; grid-template-columns:28px 1fr 90px; gap:10px; align-items:center; padding:6px 8px; border-radius:4px; background:#fff; border:1px solid var(--line); }
  .rank-num{ font-family:'IBM Plex Mono',monospace; font-size:10px; color:#8a8272; }
  .rank-name{ font-size:13px; }
  .rank-bar-wrap{ display:flex; align-items:center; gap:6px; }
  .rank-track{ flex:1; height:8px; background:var(--paper-dim); border-radius:4px; overflow:hidden; }
  .rank-fill{ height:100%; }
  .rank-val{ font-family:'IBM Plex Mono',monospace; font-size:10px; color:#55564f; width:38px; text-align:right; }

  footer{ margin-top:40px; padding-top:16px; border-top:1px solid var(--line); font-size:11.5px; color:#6b6455; line-height:1.65; }
  footer a{ color:var(--teal); }

  .modal-overlay{ display:none; position:fixed; inset:0; background:rgba(22,54,52,.45); z-index:50; align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto; }
  .modal-overlay.open{ display:flex; }
  .modal{ background:#fff; border-radius:8px; max-width:520px; width:100%; padding:22px 24px 20px; position:relative; box-shadow:0 20px 60px rgba(0,0,0,.25); }
  .modal-close{ position:absolute; top:12px; right:14px; background:none; border:none; font-size:20px; line-height:1; color:#8a8272; cursor:pointer; padding:4px; }
  .modal-close:hover{ color:var(--ink); }
  .modal-country{ font-family:'Fraunces',serif; font-weight:600; font-size:24px; color:var(--teal-deep); margin:0 0 2px; padding-right:24px; }
  .modal-sub{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8a8272; margin-bottom:14px; }
  .modal-issue-tag{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:11px; padding:4px 10px; border-radius:20px; color:#fff; margin-bottom:12px; }
  .modal-explain{ font-size:13.5px; line-height:1.55; color:#3d4a45; background:var(--paper); border-radius:6px; padding:12px 14px; margin-bottom:16px; }
  .modal-bars{ display:flex; flex-direction:column; gap:8px; }
  .modal-bar-row{ display:grid; grid-template-columns:130px 1fr 40px; gap:8px; align-items:center; }
  .modal-bar-label{ font-size:12px; }
  .modal-bar-track{ height:8px; background:var(--paper-dim); border-radius:4px; overflow:hidden; }
  .modal-bar-fill{ height:100%; border-radius:4px; }
  .modal-bar-val{ font-family:'IBM Plex Mono',monospace; font-size:11px; text-align:right; color:#55564f; }
  .clickable-modal-row{ cursor:pointer; border-radius:4px; padding:3px 4px; margin:0 -4px; transition:background .12s; }
  .clickable-modal-row:hover{ background:var(--paper-dim); }
  .clickable-modal-row:hover .modal-bar-label{ color:var(--teal-deep); font-weight:600; }
  .modal-nodata{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#a39c86; }
  .modal-subhead{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--teal); margin:18px 0 4px; padding-top:14px; border-top:1px dashed var(--line); }

  @media (max-width:480px){ .lang-toggle{ position:static; margin-bottom:10px; display:inline-flex; } .eyebrow{ padding-right:0; } .legend-row{ grid-template-columns:1fr; gap:2px; } .modal-bar-row{ grid-template-columns:100px 1fr 34px; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="lang-toggle" id="langToggle"><button data-lang="en" class="active">EN</button><button data-lang="de">DE</button></div>
    <p class="eyebrow" id="eyebrow"></p>
    <h1 id="h1"></h1>
    <p class="lede" id="lede"></p>
    <button class="legend-btn" id="legendBtn"></button>
    <div class="legend-panel" id="legendPanel"></div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <div class="view active" id="view-overview">
    <div class="summary-strip">
      <div class="summary-title" id="summaryTitle"></div>
      <div class="stack-bar" id="stackBar"></div>
      <div class="stack-legend" id="stackLegend"></div>
    </div>
    <div class="map-controls">
      <div class="map-note" id="mapNote"></div>
      <div class="control-group" id="mapColorToggle"></div>
    </div>
    <div id="mapArea"></div>
  </div>

  <div class="view" id="view-browse">
    <div class="controls"><span class="control-label" id="labelIssue"></span><div class="control-group" id="issueChips"></div></div>
    <div class="controls"><span class="control-label" id="labelRegion"></span><div class="control-group" id="regionChips"></div></div>
    <div class="controls"><input type="text" id="search" /></div>
    <p class="count" id="count"></p>
    <div class="grid" id="grid"></div>
  </div>

  <div class="view" id="view-rankings">
    <div class="rank-controls"><span class="control-label" id="labelRankBy"></span><div class="control-group" id="rankChips"></div></div>
    <div class="rank-list" id="rankList"></div>
  </div>

  <footer id="footer"></footer>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

uted elections in August 2020, Belarus dismantled its independent press almost entirely. The country's most-read outlet, Tut.by, had its media registration stripped and its staff prosecuted; today Belarus holds around 1,300 political prisoners and 37 journalists behind bars, and 39 media organizations have been formally designated \"extremist,\" a label that carries up to seven years in prison for anyone who shares their content. Nearly all independent reporting now happens from exile in Poland or Lithuania, funded by foreign donations since domestic advertising revenue disappeared along with the outlets themselves.", "de": "Nach den umstrittenen Wahlen im August 2020 hat Belarus seine unabhängige Presse fast vollständig zerschlagen. Dem meistgelesenen Medium des Landes, Tut.by, wurde die Medienregistrierung entzogen und die Mitarbeiter strafrechtlich verfolgt; heute sitzen in Belarus rund 1.300 politische Gefangene und 37 Journalisten in Haft, und 39 Medienorganisationen wurden formal als extremistisch eingestuft — ein Label, das für jeden, der deren Inhalte teilt, bis zu sieben Jahre Haft nach sich zieht. Nahezu die gesamte unabhängige Berichterstattung findet inzwischen aus dem Exil in Polen oder Litauen statt, finanziert durch ausländische Spenden, seit die inländischen Werbeeinnahmen zusammen mit den Medien selbst verschwanden."}}}, {"country": "Belgium", "iso3": "BEL", "year": 2025, "regime_code": 3, "issue_key": "Inequality", "corr": 0.031, "civlib": 0.955, "rol": 0.974, "press": 0.969, "gini": 26.8, "gini_year": 2023, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Europe", "corr_exec": 0.023, "corr_pub": 0.033, "corr_jud": 0.242, "corr_med": 0.0, "civlib_phys": 0.019, "civlib_priv": 0.064, "rol_jucon": 0.174, "rol_hcind": 0.44, "press_cens": 0.0, "press_harj": 0.248, "narratives": {}}, {"country": "Benin", "iso3": "BEN", "year": 2025, "regime_code": 1, "issue_key": "Inequality", "corr": 0.191, "civlib": 0.836, "r j": 0.717, "narratives": {}}, {"country": "Burma/Myanmar", "iso3": "MMR", "year": 2025, "regime_code": 0, "issue_key": "Press freedom / dissent", "corr": 0.859, "civlib": 0.102, "rol": 0.09, "press": 0.026, "gini": 30.7, "gini_year": 2017, "civ_deaths": 2736, "civ_badness": 0.59, "brd_deaths": 9939, "brd_badness": 0.621, "region": "Asia", "corr_exec": 0.808, "corr_pub": 0.839, "corr_jud": 0.774, "corr_med": 0.729, "civlib_phys": 0.901, "civlib_priv": 0.864, "rol_jucon": 0.975, "rol_hcind": 0.901, "press_cens": 0.99, "press_harj": 0.918, "narratives": {"press": {"en": "Since the military seized power in a 2021 coup, Myanmar has become the world's second-largest jailer of journalists after China, with over 200 arrested and roughly 40-50 still imprisoned at any given time, some serving life sentences on terrorism charges for their reporting. At least 7 to 11 journalists have been killed. The junta revoked the licenses of 15 media outlets, criminalized VPN use to block access to banned independent sites, and in 2025 passed an Election Protection Law used to prosecute journalists covering the military's own December 2025 elections, which international observers have called an attempt to manufacture legitimacy.", "de": "Seit das Militär 2021 durch einen Putsch die Macht ergriff, ist Myanmar nach China der weltweit zweitgrößte Inhaftierer von Journalisten, mit über 200 Verhaftungen und dauerhaft etwa 40–50 Inhaftierten, einige mit lebenslangen Haftstrafen wegen Terrorismusvorwürfen für ihre Berichterstattung. Mindestens 7 bis 11 Journalisten wurden getötet. Die Junta entzog 15 Medien die Lizenz, kriminalisierte VPN-Nutzung zur Umgehung von Sperren unabhängiger Seiten und verabschiedete 2025 ein Wahlschutzgesetz, das genutzt wird, um Journalisten zu verfolgen, die über die eigenen Dezember-2025-Wahlen des Militärs berichten — von internationalen Beobachtern als Versuch gewertet, Legitimität vorzutäuschen."}}}, {"country": "Burundi", "iso3": "BDI", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.845, "civlib": 0.271, "rol": 0.24, "press": 0.164, "gini": 37.5, "gini_year": 2020, "civ_deaths": 165, "civ_badness": 0.232, "brd_deaths": 421, "brd_badness": 0.291, "region": "Africa", "corr_exec": 0.76, "corr_pub": 0.874, "corr_jud": 0.902, "corr_med": 0.728, "civlib_phys": 0.892, "civlib_priv": 0.462, "rol_jucon": 0.95, "rol_hcind": 0.809, "press_cens": 0.878, "press_harj": 0.806, "narratives": {}}, {"country": "Cambodia", "iso3": "KHM", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.904, "civlib": 0.26, "rol": 0.203, "press": 0.153, "gini": null, "gini_year": null, "civ_deaths": null, "civ_badness": null, "brd_deaths": 252, "brd_badness": 0.238, "region": "Asia", "corr_exec": 0.904, "corr_pub": 0.861, "corr_jud": 0.766, "corr_med": 0.602, "civlib_phys": 0.864, "civlib_priv": 0.576, "rol_jucon": 0.928, "rol_hcind": 0.801, "press_cens": 0.806, "press_harj": 0.678, "narratives": {}}, {"country": "Cameroon", "iso3": "CMR", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.939, "civlib": 0.509, "rol": 0.489, "press": 0.532, "gini": 42.2, "gini_year": 2021, "civ_deaths": 208, "civ_badness": 0.262, "brd_deaths": 1817, "brd_badness": 0.444, "region": "Africa", "corr_exec": 0.926, "corr_pub": 0.933, "corr_jud": 0.78, "corr_med": 0.603, "civlib_phys": 0.565, "civlib_priv": 0.319, "rol_jucon": 0.889, "rol_hcind": 0.803, "press_cens": 0.55, "press_harj": 0.683, "narratives": {"corr": {"en": "Cameroon scores 26/100 on the 2025 CPI. President Paul Biya, in power since 1982 and now 92 years old, has built what analysts describe as a patronage system where senior positions are awarded largely on party loyalty, with one study finding 94% of his 1,536 senior political appointees belonged to his own party. A periodic anti-corruption campaign called Operation Sparrowhawk has jailed some former officials, but researchers and rights groups describe it as primarily a tool for sidelining internal rivals rather than a genuine reform effort, since convicted officials are sometimes released through arbitrary clemency while evidence-backed cases against allies are quietly dropped.", "de": "Kamerun erreicht im CPI 2025 26 von 100 Punkten. Präsident Paul Biya, seit 1982 an der Macht und inzwischen 92 Jahre alt, hat ein System aufgebaut, das Beobachter als Patronage-System beschreiben, in dem hochrangige Positionen weitgehend nach Parteitreue vergeben werden. Eine Studie ergab, dass 94 % seiner 1.536 hochrangigen politischen Ernennungen Mitglieder seiner eigenen Partei waren. Eine wiederkehrende Antikorruptionskampagne namens Operation Sparrowhawk hat einige ehemalige Beamte inhaftiert, wird von Forschern und Menschenrechtsgruppen jedoch vor allem als Werkzeug zur Ausschaltung interner Rivalen beschrieben statt als echte Reformbemühung, da verurteilte Beamte gelegentlich durch willkürliche Begnadigungen freikommen, während belastbare Fälle gegen Verbündete fallengelassen werden."}}}, {"country": "Canada", "iso3": "CAN", "year": 2025, "regime_code": 2, "issue_key": "Inequality", "corr": 0.026, "civlib": 0.897, "rol": 0.905, "press": 0.933, "gini": 31.5, "gini_year": 2022, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "America", "corr_exec": 0.034, "corr_pub": 0.009, "corr_jud": 0.088, "corr_med": 0.066, "civlib_phys": 0.057, "civlib_priv": 0.164, "rol_jucon": 0.102, "rol_hcind": 0.209, "press_cens": 0.073, "press_harj": 0.24, "narratives": {}}, {"country": "Cape Verde", "iso3": "CPV", "year": 2025, "regime_code": 2, "issue_key": "Inequality", "corr": 0.288, "civlib": 0.907, "rol": 0.879, "press": 0.857, "gini": 42.4, "gini_year": 2015, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Africa", "corr_exec": 0.229, "corr_pub": 0.325, "corr_jud": 0.39, "corr_med": 0.079, "civlib_phys": 0.063, "civlib_priv": 0.092, "rol_jucon": 0.126, "rol_hcind": 0.31, "press_cens": 0.326, "press_harj": 0.266, "narratives": {}}, {"country": "Central African Republic", "iso3": "CAF", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.854, "civlib": 0.438, "rol": 0.239, "press": 0.613, "gini": 43.0, "gini_year": 2021, "civ_deaths": 368, "civ_badness": 0.334, "brd_deaths": 2216, "brd_badness": 0.465, "region": "Africa", "corr_exec": 0.768, "corr_pub": 0.872, "corr_jud": 0.665, "corr_med": 0.653, "civlib_phys": 0.605, "civlib_priv": 0.601, "rol_jucon": 0.812, "rol_hcind": 0.657, "press_cens": 0.583, "press_harj": 0.505, "narratives": {}}, {"country": "Chad", "iso3": "TCD", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.952, "civlib": 0.284, "rol": 0.186, "press": 0.427, "gini": 37.4, "gini_year": 2022, "civ_deaths": null, "civ_badness": null, "brd_deaths": 582, "brd_badness": 0.325, "region": "Africa", "corr_exec": 0.976, "corr_pub": 0.968, "corr_jud": 0.73, "corr_med": 0.701, "civlib_phys": 0.921, "civlib_priv": 0.532, "rol_jucon": 0.991, "rol_hcind": 0.909, "press_cens": 0.815, "press_harj": 0.653, "narratives": {"corr": {"en": "Chad scores 24/100 on the 2025 CPI. Oil revenue, which makes up roughly 60% of export earnings since production began in 2003, was meant to fund development under a World Bank-brokered transparency framework, but was progressively redirected toward the military as President Idriss Deby fought off rebellions. When Deby died on the battlefield in 2021, his son took power in a military coup rather than following the constitutional succession process. The 2021 Pandora Papers leak showed Deby's stepson holding an ownership stake in an offshore Seychelles company alongside a relative and an associate linked to arms deliveries for the Chadian army, while a 2012 anti-corruption campaign that recovered some embezzled funds was, according to rights groups, also used to sideline the president's rivals.", "de": "Tschad erreicht im CPI 2025 24 von 100 Punkten. Öleinnahmen, die seit Produktionsbeginn 2003 rund 60 % der Exporterlöse ausmachen, sollten laut einem von der Weltbank vermittelten Transparenzrahmen die Entwicklung finanzieren, wurden jedoch zunehmend ins Militär umgeleitet, während Präsident Idriss Déby Rebellionen niederschlug. Als Déby 2021 im Kampf starb, übernahm sein Sohn die Macht durch einen Militärputsch statt durch das verfassungsmäßige Nachfolgeverfahren. Die Pandora Papers von 2021 zeigten, dass Débys Stiefsohn eine Beteiligung an einer Offshore-Firma auf den Seychellen hielt, gemeinsam mit einem Verwandten und einer mit Waffenlieferungen für die tschadische Armee verbundenen Person, während eine Antikorruptionskampagne 2012, die einige veruntreute Gelder zurückholte, laut Menschenrechtsgruppen auch zur Ausschaltung von Rivalen des Präsidenten diente."}}}, {"country": "Chile", "iso3": "CHL", "year": 2025, "regime_code": 3, "issue_key": "Inequality", "corr": 0.075, "civlib": 0.93, "rol": 0.94, "press": 0.926, "gini": 43.0, "gini_year": 2024, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "America", "corr_exec": 0.044, "corr_pub": 0.103, "corr_jud": 0.308, "corr_med": 0.142, "civlib_phys": 0.071, "civlib_priv": 0.069, "rol_jucon": 0.059, "rol_hcind": 0.277, "press_cens": 0.129, "press_harj": 0.264, "narratives": {}}, {"country": "China", "iso3": "CHN", "year": 2025, "regime_code": 0, "issue_key": "Press freedom / dissent", "corr": 0.554, "civlib": 0.179, "rol": 0.227, "press": 0.045, "gini": 36.0, "gini_year": 2022, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Asia", "corr_exec": 0.534, "corr_pub": 0.498, "corr_jud": 0.691, "corr_med": 0.878, "civlib_phys": 0.655, "civlib_priv": 0.855, "rol_jucon": 0.97, "rol_hcind": 0.836, "press_cens": 0.909, "press_harj": 0.728, "narratives": {"press": {"en": "China is the world's leading jailer of journalists, holding roughly 50 behind bars as of late 2025, nearly half of them from the Xinjiang region. Veteran editor Dong Yuyu was sentenced to seven years on espionage charges in 2025 for meeting foreign diplomats over lunch; in Hong Kong, media mogul Jimmy Lai received a 20-year sentence in February 2026 under the national security law, a case CPJ called the territory's most shameful act of press persecution. China ranks 178-179 out of 180 countries on RSF's press freedom index, with authorities using vaguely defined charges like espionage and picking quarrels and provoking trouble to prosecute reporting on politically sensitive topics.", "de": "China ist weltweit der größte Inhaftierer von Journalisten mit rund 50 Inhaftierten Ende 2025, fast die Hälfte davon aus der Region Xinjiang. Der langjährige Redakteur Dong Yuyu wurde 2025 wegen Spionagevorwürfen zu sieben Jahren Haft verurteilt, weil er sich mit ausländischen Diplomaten zum Mittagessen getroffen hatte; in Hongkong erhielt Medienunternehmer Jimmy Lai im Februar 2026 unter dem Sicherheitsgesetz eine 20-jährige Haftstrafe — von CPJ als schändlichste Pressemedien-Verfolgung des Territoriums bezeichnet. China liegt im RSF-Pressefreiheitsindex auf Platz 178–179 von 180, wobei Behörden vage definierte Vorwürfe wie Spionage oder Streitsuche und Provokation von Unruhe nutzen, um Berichterstattung zu politisch sensiblen Themen zu verfolgen."}}}, {"country": "Colombia", "iso3": "COL", "year": 2025, "regime_code": 2, "issue_key": "Inequality", "corr": 0.388, "civlib": 0.765, "rol": 0.721, "press": 0.81, "gini": 54.4, "gini_year": 2024, "civ_deaths": 934, "civ_badness": 0.453, "brd_deaths": 850, "brd_badness": 0.364, "region": "America", "corr_exec": 0.307, "corr_pub": 0.322, "corr_jud": 0.412, "corr_med": 0.353, "civlib_phys": 0.357, "civlib_priv": 0.167, "rol_jucon": 0.154, "rol_hcind": 0.184, "press_cens": 0.344, "press_harj": 0.469, "narratives": {}}, {"country": "Comoros", "iso3": "COM", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.774, "civlib": 0.476, "rol": 0.364, "press": 0.498, "gini": 30.3, "gini_year": 2024, " orruption concerns, but critics note that new minerals-for-security agreements with foreign powers raise their own transparency questions.", "de": "Die Demokratische Republik Kongo produziert rund 70 % des weltweiten Kobalts, und die Kontrolle über diesen Mineralienreichtum — sowie Gold, Coltan und Zinn — ist eng mit Korruption und dem andauernden bewaffneten Konflikt im Osten des Landes verflochten. Bewaffnete Gruppen besteuern und schmuggeln Mineralien über Nachbarländer, oft mit Duldung von Grenzbeamten und staatsnahen Akteuren, während der informelle Kleinbergbau weitgehend außerhalb offizieller Kontrolle stattfindet. Eine Antikorruptions-Maßnahme im Dezember 2025 setzte handwerkliche Kupfer- und Kobalt-Verarbeitungszentren aus, doch Kritiker weisen darauf hin, dass neue \"Minerals-für-Sicherheit\"-Abkommen mit ausländischen Mächten eigene Transparenzfragen aufwerfen."}}}, {"country": "Denmark", "iso3": "DNK", "year": 2025, "regime_code": 3, "issue_key": "Inequality", "corr": 0.004, "civlib": 0.959, "rol": 0.986, "press": 0.98, "gini": 29.9, "gini_year": 2023, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Europe", "corr_exec": 0.003, "corr_pub": 0.005, "corr_jud": 0.017, "corr_med": 0.011, "civlib_phys": 0.03, "civlib_priv": 0.062, "rol_jucon": 0.016, "rol_hcind": 0.075, "press_cens": 0.036, "press_harj": 0.0, "narratives": {}}, {"country": "Djibouti", "iso3": "DJI", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.706, "civlib": 0.404, "rol": 0.448, "press": 0.336, "gini": 41.6, "gini_year": 2017, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Africa", "corr_exec": 0.712, "corr_pub": 0.715, "corr_jud": 0.707, "corr_med": 0.495, "civlib_phys": 0.587, "civlib_priv": 0.611, "rol_jucon": 0.732, "rol_hcind": 0.48, "press_cens": 0.688, "press_harj": 0.639, "narratives": {}}, {"country": "Dominican Republic", "iso3": "DOM", "year": 2025, "regime_code": 2, " }}, {"country": "Equatorial Guinea", "iso3": "GNQ", "year": 2025, "regime_code": 1, "issue_key": "Press freedom / dissent", "corr": 0.858, "civlib": 0.169, "rol": 0.169, "press": 0.112, "gini": 38.5, "gini_year": 2022, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Africa", "corr_exec": 0.898, "corr_pub": 0.9, "corr_jud": 0.724, "corr_med": 0.877, "civlib_phys": 0.882, "civlib_priv": 0.73, "rol_jucon": 0.992, "rol_hcind": 0.915, "press_cens": 0.827, "press_harj": 0.812, "narratives": {}}, {"country": "Eritrea", "iso3": "ERI", "year": 2025, "regime_code": 0, "issue_key": "Press freedom / dissent", "corr": 0.752, "civlib": 0.047, "rol": 0.026, "press": 0.024, "gini": null, "gini_year": null, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Africa", "corr_exec": 0.736, "corr_pub": 0.776, "corr_jud": 0.639, "corr_med": 0.991, "civlib_phys": 0.899, "civlib_priv": 0.993, "rol_jucon": 0.972, "rol_hcind": 0.717, "press_cens": 0.995, "press_harj": 0.875, "narratives": {"press": {"en": "Eritrea has had no privately owned media of any kind since September 2001, when the government banned all independent newspapers overnight and imprisoned their editors without charge or trial. Of the roughly a dozen journalists arrested that day, only a handful are believed to still be alive, held incommunicado in secret prisons for over two decades, making them among the longest-detained journalists in the world. Eritrea has ranked last or near-last on the World Press Freedom Index for most of the past 15 years, and the only independent outlet reaching Eritreans, Radio Erena, broadcasts from exile in Paris and is routinely jammed.", "de": "Eritrea besitzt seit September 2001 keinerlei private Medien mehr, nachdem die Regierung über Nacht alle unabhängigen Zeitungen verbot und deren Redakteure ohne Anklage oder Prozess inhaftierte. Von den rund einem Dutzend an jenem Tag verhafteten Journalisten sollen nur noch wenige am Leben sein, seit über zwei Jahrzehnten ohne Kontakt zur Außenwelt in Geheimgefängnissen — sie zählen damit zu den am längsten inhaftierten Journalisten weltweit. Eritrea belegt seit 15 Jahren meist den letzten oder vorletzten Platz im World Press Freedom Index, und das einzige unabhängige Medium, das Eritreer erreicht, Radio Erena, sendet aus dem Pariser Exil und wird routinemäßig gestört."}}}, {"country": "Estonia", "iso3": "EST", "year": 2025, "regime_code": 3, "issue_key": "Inequality", "corr": 0.025, "civlib": 0.963, "rol": 0.979, "press": 0.969, "gini": 30.7, "gini_year": 2023, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Europe", "corr_exec": 0.026, "corr_pub": 0.037, "corr_jud": 0.182, "corr_med": 0.138, "civlib_phys": 0.02, "civlib_priv": 0.047, "rol_jucon": 0.031, "rol_hcind": 0.195, "press_cens": 0.044, "press_harj": 0.104, "narratives": {}}, {"country": "Eswatini", "iso3": "SWZ", "year": 2025, "regime_code": 0, "issue_key": "Press freedom / dissent", "corr": 0.554, "civlib": 0.206, "rol": 0.252, "press": 0.113, "gini": 54.6, "gini_year": 2016, "civ_deaths": 48, "civ_badness": 0.076, "brd_deaths": null, "brd_badness": null, "region": "Africa", "corr_exec": 0.647, "corr_pub": 0.864, "corr_jud": 0.321, "corr_med": 0.724, "civlib_phys": 0.868, "civlib_priv": 0.587, "rol_jucon": 0.685, "rol_hcind": 0.528, "press_cens": 0.81, "press_harj": 0.643, "narratives": {}}, {"country": "Ethiopia", "iso3": "ETH", "year": 2025, "regime_code": 1, "issue_key": "War (battle deaths)", "corr": 0.529, "civlib": 0.304, "rol": 0.341, "press": 0.285, "gini": 31.1, "gini_year": 2021, "civ_deaths": 6156, "civ_badness": 0.694, "brd_deaths": 296675, "brd_badness": 0.976, "region": "Africa", "corr_exec": 0.313, "corr_pub": 0.678, "corr_jud": 0.713, "corr_med": 0.466, "civlib_phys": 0.734, "civlib_priv": 0.699, "rol_jucon": 0.787, "rol_hcind": 0.67, "press_cens": 0.597, "press_harj": 0.642, "narratives": {}}, {"country": " , "region": "Europe", "corr_exec": 0.724, "corr_pub": 0.189, "corr_jud": 0.394, "corr_med": 0.568, "civlib_phys": 0.045, "civlib_priv": 0.168, "rol_jucon": 0.322, "rol_hcind": 0.65, "press_cens": 0.53, "press_harj": 0.427, "narratives": {}}, {"country": "Iceland", "iso3": "ISL", "year": 2025, "regime_code": 3, "issue_key": "Inequality", "corr": 0.014, "civlib": 0.95, "rol": 0.974, "press": 0.846, "gini": 26.8, "gini_year": 2019, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Europe", "corr_exec": 0.023, "corr_pub": 0.011, "corr_jud": 0.045, "corr_med": 0.103, "civlib_phys": 0.011, "civlib_priv": 0.056, "rol_jucon": 0.045, "rol_hcind": 0.192, "press_cens": 0.098, "press_harj": 0.465, "narratives": {}}, {"country": "India", "iso3": "IND", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.684, "civlib": 0.534, "rol": 0.578, "press": 0.458, "gini": 25.5, "gini_year": 2022, "civ_deaths": 266, "civ_badness": 0.293, "brd_deaths": 1998, "brd_badness": 0.454, "region": "Asia", "corr_exec": 0.688, "corr_pub": 0.692, "corr_jud": 0.541, "corr_med": 0.533, "civlib_phys": 0.489, "civlib_priv": 0.369, "rol_jucon": 0.333, "rol_hcind": 0.394, "press_cens": 0.576, "press_harj": 0.557, "narratives": {}}, {"country": "Indonesia", "iso3": "IDN", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.795, "civlib": 0.63, "rol": 0.58, "press": 0.688, "gini": 34.4, "gini_year": 2025, "civ_deaths": 28, "civ_badness": 0.009, "brd_deaths": 318, "brd_badness": 0.262, "region": "Asia", "corr_exec": 0.775, "corr_pub": 0.811, "corr_jud": 0.585, "corr_med": 0.536, "civlib_phys": 0.364, "civlib_priv": 0.324, "rol_jucon": 0.416, "rol_hcind": 0.374, "press_cens": 0.503, "press_harj": 0.485, "narratives": {}}, {"country": "Iran", "iso3": "IRN", "year": 2025, "regime_code": 1, "issue_key": "Press freedom / dissent", "corr": 0.768, "civlib": 0.248, "rol": 0.297, "press": 0.166, "gini": 35.9, "gini_year": 2023, "civ_deaths": 237, "civ_badness": 0.278, "brd_deaths": 2382, "brd_badness": 0.472, "region": "Asia", "corr_exec": 0.646, "corr_pub": 0.661, "corr_jud": 0.689, "corr_med": 0.757, "civlib_phys": 0.764, "civlib_priv": 0.655, "rol_jucon": 0.884, "rol_hcind": 0.732, "press_cens": 0.766, "press_harj": 0.713, "narratives": {"press": {"en": "Iran cut off nearly all internet and phone access nationwide from January 2026 in response to protests that erupted in late December 2025 over the collapsing currency, making it one of the most severe media blackouts anywhere in the world. Human rights monitors estimate the security crackdown that followed killed several thousand protesters, with one UN rapporteur's sources suggesting a toll as high as 20,000, though verification remains nearly impossible given the blackout. Nobel Peace Prize laureate and journalist Narges Mohammadi had her prison sentence extended by more than seven years after her December 2025 arrest, and RSF counted at least 21 journalists detained as of 2025, ranking Iran 176th of 180 countries for press freedom.", "de": "Iran kappte ab Januar 2026 landesweit nahezu jeglichen Internet- und Telefonzugang als Reaktion auf Proteste, die Ende Dezember 2025 wegen der einbrechenden Währung ausbrachen — eine der schwersten Medien-Blackouts weltweit. Menschenrechtsbeobachter schätzen, dass die folgende Sicherheitsniederschlagung mehrere Tausend Demonstranten das Leben kostete, wobei Quellen eines UN-Sonderberichterstatters eine mögliche Zahl von bis zu 20.000 nannten — eine Verifizierung ist wegen des Blackouts kaum möglich. Der Nobelpreisträgerin und Journalistin Narges Mohammadi wurde nach ihrer Verhaftung im Dezember 2025 die Haftstrafe um mehr als sieben Jahre verlängert, und RSF zählte 2025 mindestens 21 inhaftierte Journalisten — Iran liegt damit auf Platz 176 von 180 im Pressefreiheitsindex."}}}, {"country": "Iraq", "iso3": "IRQ", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.892, "civlib": 0.521, "rol": 0.451, "press": 0.571, "gini": 29.8, "gini_year": 2023, "civ_deaths": 34, "civ_badness": 0.033, "brd_deaths": 1544, "brd_badness": 0.427, "region": "Asia", "corr_exec": 0.911, "corr_pub": 0.741, "corr_jud": 0.823, "corr_med": 0.548, "civlib_phys": 0.576, "civlib_priv": 0.395, "rol_jucon": 0.644, "rol_hcind": 0.542, "press_cens": 0.561, "press_harj": 0.529, "narratives": {"corr": {"en": "Iraq ranks 136th of 182 on the 2025 CPI — poor, but improving. Much of the root cause is structural: the \"muhasasa\" system divides government ministries among Shia, Sunni, and Kurdish parties as informal patronage, and contracts inside those ministries are routinely inflated with profits split among connected businesspeople and party officials. A 2026 anti-corruption crackdown under new PM Ali al-Zaidi has seized roughly $86 million in cash and dozens of properties from senior officials, though it remains untested whether it will outlast the system that produced the corruption in the first place.", "de": "Der Irak liegt im CPI 2025 auf Platz 136 von 182 — schlecht, aber mit leichter Verbesserung. Die Ursache ist weitgehend strukturell: Das \"Muhasasa\"-System verteilt Ministerien informell als Patronage auf schiitische, sunnitische und kurdische Parteien, und Verträge innerhalb dieser Ministerien werden routinemäßig aufgebläht, wobei sich verbundene Geschäftsleute und Parteifunktionäre die Gewinne teilen. Eine Antikorruptions-Aktion 2026 unter dem neuen Premierminister Ali al-Zaidi beschlagnahmte rund 86 Millionen US-Dollar in bar sowie zahlreiche Immobilien hochrangiger Beamter — ob sie das System überdauert, das die Korruption erst hervorgebracht hat, ist offen."}}}, {"country": "Ireland", "iso3": "IRL", "year": 2025, "regime_code": 3, "issue_key": "Inequality", "corr": 0.032, "civlib": 0.956, "rol": 0.975, "press": 0.97, "gini": 29.0, "gini_year": 2023, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Europe", "corr_exec": 0.017, "corr_pu lange durch ein tatsächlich einflussreiches gewähltes Parlament hervor, doch im Mai 2024 löste der neu inthronisierte Emir es auf, setzte zentrale Verfassungsartikel für bis zu vier Jahre aus und übernahm die Gesetzgebungsbefugnisse direkt. Freedom House stufte Kuwait daraufhin von teilweise frei auf nicht frei herab. Die Regierung hat seither die Anwendung eines Gesetzes zur Staatsbürgerschaftsaberkennung verschärft, das von gerichtlicher Überprüfung ausgenommen ist, und in einem einzigen Dekret vom November 2024 Hunderten Menschen, darunter 130 Frauen und ihren Angehörigen, die Staatsbürgerschaft entzogen sowie Politiker inhaftiert, die die Auflösung kritisierten."}}}, {"country": "Kyrgyzstan", "iso3": "KGZ", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.793, "civlib": 0.478, "rol": 0.58, "press": 0.469, "gini": 27.5, "gini_year": 2024, "civ_deaths": null, "civ_badness": null, "brd_deaths": 206, "brd_badness": 0.217, "region": "Asia", "corr_exec": 0.707, "corr_pub": 0.666, "corr_jud": 0.703, "corr_med": 0.494, "civlib_phys": 0.694, "civlib_priv": 0.287, "rol_jucon": 0.642, "rol_hcind": 0.563, "press_cens": 0.596, "press_harj": 0.612, "narratives": {}}, {"country": "Laos", "iso3": "LAO", "year": 2025, "regime_code": 0, "issue_key": "Press freedom / dissent", "corr": 0.765, "civlib": 0.144, "rol": 0.22, "press": 0.032, "gini": 34.7, "gini_year": 2024, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Asia", "corr_exec": 0.621, "corr_pub": 0.694, "corr_jud": 0.696, "corr_med": 0.851, "civlib_phys": 0.84, "civlib_priv": 0.796, "rol_jucon": 0.429, "rol_hcind": 0.353, "press_cens": 0.764, "press_harj": 0.854, "narratives": {}}, {"country": "Latvia", "iso3": "LVA", "year": 2025, "regime_code": 3, "issue_key": "Inequality", "corr": 0.07, "civlib": 0.94, "rol": 0.974, "press": 0.932, "gini": 34.0, "gini_year": 2023, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": " vlib": 0.077, "rol": 0.03, "press": 0.018, "gini": 46.2, "gini_year": 2014, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "America", "corr_exec": 0.917, "corr_pub": 0.911, "corr_jud": 0.829, "corr_med": 0.865, "civlib_phys": 0.941, "civlib_priv": 0.856, "rol_jucon": 0.997, "rol_hcind": 0.96, "press_cens": 0.875, "press_harj": 1.0, "narratives": {"press": {"en": "Since the 2018 protest crackdown, Nicaragua's government has closed or confiscated more than 60 independent media outlets and forced an estimated 300 journalists into exile, according to Reporters Without Borders, which now ranks the country the worst press freedom environment in Latin America. A January 2025 constitutional rewrite made First Lady Rosario Murillo co-president and further expanded state control over media, stated as a way to counter foreign interference. Reporters who remain in the country describe daily police check-ins, confiscated devices, and prosecution under a 2020 cybercrime law that criminalizes reporting the government calls false information.", "de": "Seit der Niederschlagung der Proteste 2018 hat die nicaraguanische Regierung mehr als 60 unabhängige Medien geschlossen oder beschlagnahmt und schätzungsweise 300 Journalisten ins Exil gezwungen, so Reporter ohne Grenzen, die das Land inzwischen als schlechtestes Pressefreiheits-Umfeld Lateinamerikas einstufen. Eine Verfassungsänderung vom Januar 2025 machte Vizepräsidentin Rosario Murillo zur Ko-Präsidentin und weitete die staatliche Medienkontrolle weiter aus, offiziell zur Abwehr ausländischer Einmischung. Verbliebene Journalisten berichten von täglichen Meldepflichten bei der Polizei, beschlagnahmten Geräten und Strafverfolgung nach einem Cyberkriminalitätsgesetz von 2020, das Berichterstattung als Falschinformation einstuft."}}}, {"country": "Niger", "iso3": "NER", "year": 2025, "regime_code": 0, "issue_key": "Corruption", "corr": 0.591, "civlib": 0.65, "rol": 0.715, "press": 0.756, "gini": 32.9, "gini_year": 2021, "civ_deaths": null, "civ_badness": null, "brd_deaths": 2866, "brd_badness": 0.491, "region": "Africa", "corr_exec": 0.364, "corr_pub": 0.676, "corr_jud": 0.629, "corr_med": 0.538, "civlib_phys": 0.496, "civlib_priv": 0.294, "rol_jucon": 0.313, "rol_hcind": 0.44, "press_cens": 0.415, "press_harj": 0.296, "narratives": {}}, {"country": "Nigeria", "iso3": "NGA", "year": 2025, "regime_code": 2, "issue_key": "Corruption", "corr": 0.834, "civlib": 0.674, "rol": 0.684, "press": 0.849, "gini": 33.9, "gini_year": 2022, "civ_deaths": 576, "civ_badness": 0.391, "brd_deaths": 9178, "brd_badness": 0.613, "region": "Africa", "corr_exec": 0.864, "corr_pub": 0.91, "corr_jud": 0.595, "corr_med": 0.477, "civlib_phys": 0.673, "civlib_priv": 0.152, "rol_jucon": 0.582, "rol_hcind": 0.509, "press_cens": 0.395, "press_harj": 0.426, "narratives": {"corr": {"en": "Nigeria scores 26/100 on the 2025 CPI. Oil and gas provide over 90% of export revenue and are managed through the state-owned NNPC, which a parliamentary inquiry found had failed to remit some $20 billion to the treasury; a separate fuel-subsidy probe found roughly half the money the government claimed to spend on subsidies had simply been stolen by officials and marketers, totaling billions of dollars over multiple years. Only a handful of the dozens implicated in the subsidy fraud were ever convicted. Nigeria's federal budget depends so heavily on oil revenue that corruption in the sector directly constrains funding for the electricity, health, and education systems most Nigerians depend on.", "de": "Nigeria erreicht im CPI 2025 26 von 100 Punkten. Öl und Gas liefern über 90 % der Exporterlöse und werden über die staatliche NNPC verwaltet, die laut einer parlamentarischen Untersuchung rund 20 Milliarden US-Dollar nicht an den Staatshaushalt abführte; eine separate Untersuchung zu Treibstoffsubventionen ergab, dass etwa die Hälfte der angeblich für Subventionen ausgegebenen Gelder schlicht von Beamten und Händlern gestohlen wurde — über mehrere Jahre hinweg Milliarden von Dollar. Nur eine Handvoll der Dutzenden Beteiligten am Subventionsbetrug wurde je verurteilt. Nigerias Bundeshaushalt hängt so stark von Öleinnahmen ab, dass Korruption in diesem Sektor die Finanzierung von Strom-, Gesundheits- und Bildungssystemen, auf die die meisten Nigerianer angewiesen sind, direkt einschränkt."}}}, {"country": "North Korea", "iso3": "PRK", "year": 2025, "regime_code": 0, "issue_key": "Rule of law", "corr": 0.67, "civlib": 0.024, "rol": 0.008, "press": 0.013, "gini": null, "gini_year": null, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Asia", "corr_exec": 0.855, "corr_pub": 0.808, "corr_jud": 0.669, "corr_med": 1.0, "civlib_phys": 0.947, "civlib_priv": 0.999, "rol_jucon": 0.997, "rol_hcind": 0.947, "press_cens": 0.963, "press_harj": 0.886, "narratives": {"rol": {"en": "North Korea's courts are formally accountable to the Supreme People's Assembly, but in practice the judiciary exists to enforce Workers' Party directives rather than to constrain state power. Judges are Party members with no legal-independence safeguards, political cases are frequently decided by the Ministry of State Security before any trial takes place, and defectors report bribery is common at every stage of detention and prosecution. Freedom House and UN human rights bodies describe a system of arbitrary arrest, forced confession, and camps for political prisoners operating largely outside any judicial oversight.", "de": "Nordkoreas Gerichte sind formal der Obersten Volksversammlung unterstellt, dienen in der Praxis jedoch der Durchsetzung von Parteivorgaben statt der Kontrolle staatlicher Macht. Richter sind Parteimitglieder ohne Unabhängigkeitsgarantien, politische Fälle werden oft schon vom Ministerium für Staatssicherheit entschieden, bevor überhaupt ein Prozess stattfindet, und Überläufer berichten von verbreiteter Bestechung in jeder Phase von Haft und Verfolgung. Freedom House und UN-Menschenrechtsgremien beschreiben ein System aus willkürlichen Verhaftungen, erzwungenen Geständnissen und Lagern für politische Gefangene, das weitgehend außerhalb jeder gerichtlichen Aufsicht operiert."}}}, {"country": "North Macedonia", "iso3": "MKD", "year": 2025, "regime_code": 2, "issue_key": "Corruption", "corr": 0.753, "civlib": 0.789, "rol": 0.745, "press": 0.664, "gini": 33.5, "gini_year": 2019, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Europe", "corr_exec": 0.701, "corr_pub": 0.517, "corr_jud": 0.758, "corr_med": 0.513, "civlib_phys": 0.182, "civlib_priv": 0.194, "rol_jucon": 0.541, "rol_hcind": 0.568, "press_cens": 0.501, "press_harj": 0.382, "narratives": {}}, {"country": "Norway", "iso3": "NOR", "year": 2025, "regime_code": 3, "issue_key": "Inequality", "corr": 0.01, "civlib": 0.947, "rol": 0.972, "press": 0.953, "gini": 26.5, "gini_year": 2023, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Europe", "corr_exec": 0.011, "corr_pub": 0.012, "corr_jud": 0.146, "corr_med": 0.094, "civlib_phys": 0.012, "civlib_priv": 0.09, "rol_jucon": 0.045, "rol_hcind": 0.106, "press_cens": 0.137, "press_harj": 0.139, "narratives": {}}, {"country": "Oman", "iso3": "OMN", "year": 2025, "regime_code": 0, "issue_key": "Press freedom / dissent", "corr": 0.253, "civlib": 0.446, "rol": 0.578, "press": 0.151, "gini": null, "gini_year": null, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Asia", "corr_exec": 0.345, "corr_pub": 0.348, "corr_jud": 0.309, "corr_med": 0.677, "civlib_phys": 0.285, "civlib_priv": 0.553, "rol_jucon": 0.565, "rol_hcind": 0.472, "press_cens": 0.693, "press_harj": 0.701, "narratives": {}}, {"country": "Pakistan", "iso3": "PAK", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.802, "civlib": 0.466, "rol": 0.343, "press": 0.559, "gini": 33.5, "gini_year": 2024, v_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Oceania", "corr_exec": 0.547, "corr_pub": 0.608, "corr_jud": 0.462, "corr_med": 0.404, "civlib_phys": 0.116, "civlib_priv": 0.192, "rol_jucon": 0.18, "rol_hcind": 0.288, "press_cens": 0.303, "press_harj": 0.356, "narratives": {}}, {"country": "Somalia", "iso3": "SOM", "year": 2025, "regime_code": 0, "issue_key": "Corruption", "corr": 0.87, "civlib": 0.454, "rol": 0.393, "press": 0.619, "gini": null, "gini_year": null, "civ_deaths": null, "civ_badness": null, "brd_deaths": 14351, "brd_badness": 0.66, "region": "Africa", "corr_exec": 0.722, "corr_pub": 0.9, "corr_jud": 0.855, "corr_med": 0.693, "civlib_phys": 0.451, "civlib_priv": 0.728, "rol_jucon": 0.792, "rol_hcind": 0.672, "press_cens": 0.721, "press_harj": 0.518, "narratives": {"corr": {"en": "Somalia has effectively lacked a functioning central state since 1991, and clan-based patronage networks fill much of that vacuum today: government positions and security contracts are distributed along clan lines as often as by merit, and the national army suffers from what its own defense chief has called poor leadership and corruption, with loyalty to individual clans and politicians frequently outweighing national command. Al-Shabaab has exploited these divisions directly, in some cases pressuring clan elders to nominate sympathetic candidates for office, turning corruption and state weakness into a recruiting and territorial advantage for the insurgency it is meant to be fighting.", "de": "Somalia fehlt seit 1991 faktisch ein funktionierender Zentralstaat, und clanbasierte Patronage-Netzwerke füllen heute einen Großteil dieses Vakuums: Regierungsposten und Sicherheitsaufträge werden ebenso häufig entlang von Clanlinien wie nach Eignung vergeben, und die Nationalarmee leidet laut ihrem eigenen Verteidigungschef unter schlechter Führung und Korruption, wobei die Loyalität zu einzelnen Clans und Politikern oft schwerer wiegt als die nationale Befehlskette. Al-Shabaab nutzt diese Spaltungen gezielt aus, indem sie teils Clan-Älteste unter Druck setzt, ihnen wohlgesinnte Kandidaten für Ämter zu nominieren — Korruption und Staatsschwäche werden so zum Rekrutierungs- und Gebietsvorteil für den Aufstand, den sie eigentlich bekämpfen soll."}}}, {"country": "Somaliland", "iso3": "SML", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.559, "civlib": 0.629, "rol": 0.579, "press": 0.653, "gini": null, "gini_year": null, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Africa", "corr_exec": 0.523, "corr_pub": 0.496, "corr_jud": 0.598, "corr_med": 0.476, "civlib_phys": 0.349, "civlib_priv": 0.413, "rol_jucon": 0.539, "rol_hcind": 0.556, "press_cens": 0.526, "press_harj": 0.572, "narratives": {}}, {"country": "South Africa", "iso3": "ZAF", "year": 2025, "regime_code": 2, "issue_key": "Inequality", "corr": 0.538, "civlib": 0.857, "rol": 0.861, "press": 0.837, "gini": 54.1, "gini_year": 2022, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Africa", "corr_exec": 0.59, "corr_pub": 0.755, "corr_jud": 0.462, "corr_med": 0.26, "civlib_phys": 0.151, "civlib_priv": 0.14, "rol_jucon": 0.105, "rol_hcind": 0.21, "press_cens": 0.279, "press_harj": 0.349, "narratives": {}}, {"country": "South Korea", "iso3": "KOR", "year": 2025, "regime_code": 3, "issue_key": "Inequality", "corr": 0.156, "civlib": 0.912, "rol": 0.942, "press": 0.933, "gini": 32.9, "gini_year": 2021, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Asia", "corr_exec": 0.078, "corr_pub": 0.162, "corr_jud": 0.305, "corr_med": 0.162, "civlib_phys": 0.048, "civlib_priv": 0.106, "rol_jucon": 0.128, "rol_hcind": 0.265, "press_cens": 0.249, "press_harj": 0.25, "narratives": {}}, {"country": "South Sudan", "iso3": "SSD", "year": 2025, "regime_code": 0, "issue_key": "Corruption", "corr": 0.893, "civlib": 0.228, "rol": 0.171, "press": 0.155, "gini": 44.0, "gini_year": 2016, "civ_deaths": 123, "civ_badness": 0.195, "brd_deaths": 470, "brd_badness": 0.303, "region": "Africa", "corr_exec": 0.9, "corr_pub": 0.904, "corr_jud": 0.819, "corr_med": 0.553, "civlib_phys": 0.676, "civlib_priv": 0.772, "rol_jucon": 0.843, "rol_hcind": 0.777, "press_cens": 1.0, "press_harj": 0.775, "narratives": {"corr": {"en": "South Sudan is tied for the lowest score in the world (9/100). A September 2025 UN inquiry found that an \"Oil for Roads\" scheme diverted roughly $2.2 billion off-budget into political patronage networks, implicating a sitting vice president. Around 85–90% of national revenue comes from oil, but the Petroleum Ministry has published no public accounts since 2021, leaving that income essentially untracked.", "de": "Der Südsudan teilt sich mit anderen Ländern den weltweit niedrigsten Wert (9/100). Eine UN-Untersuchung vom September 2025 stellte fest, dass ein \"Öl-für-Straßen\"-Programm rund 2,2 Milliarden US-Dollar am Haushalt vorbei in politische Patronage-Netzwerke umgeleitet hat, wobei auch ein amtierender Vizepräsident belastet wird. Etwa 85–90 % der Staatseinnahmen stammen aus Öl, doch das Erdölministerium hat seit 2021 keine öffentlichen Abrechnungen mehr veröffentlicht — die Einnahmen bleiben praktisch unkontrolliert."}}}, {"country": "Spain", "iso3": "ESP", "year": 2025, "regime_code": 3, "issue_key": "Inequality", "corr": 0.113, "civlib": 0.942, "rol": 0.971, "press": 0.843, "gini": 33.4, "gini_year": 2023, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Europe", "corr_exec": 0.107, "corr_pub": 0.069, "corr_jud": 0.294, "corr_med": 0.345, "civlib_phys": 0.024, "civlib_priv": 0.062, "rol_jucon": 0.063, "rol_hcind": 0.288, "press_cens": 0.357, "press_harj": 0.283, "narratives": {}}, {"country": "Sri Lanka", "iso3": "LKA", "year": 2025, "regime_code": 2, "issue_key": "Inequality", "corr": 0.278, "civlib": 0.816, "rol": 0.77, "press": 0.871, "gini": 37. : 0.02, "civlib": 0.95, "rol": 0.982, "press": 0.967, "gini": 33.8, "gini_year": 2022, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Europe", "corr_exec": 0.01, "corr_pub": 0.007, "corr_jud": 0.153, "corr_med": 0.049, "civlib_phys": 0.019, "civlib_priv": 0.09, "rol_jucon": 0.018, "rol_hcind": 0.171, "press_cens": 0.227, "press_harj": 0.026, "narratives": {}}, {"country": "Syria", "iso3": "SYR", "year": 2025, "regime_code": 0, "issue_key": "Rule of law", "corr": 0.619, "civlib": 0.321, "rol": 0.316, "press": 0.358, "gini": 26.4, "gini_year": 2022, "civ_deaths": 1967, "civ_badness": 0.548, "brd_deaths": 6668, "brd_badness": 0.58, "region": "Asia", "corr_exec": 0.389, "corr_pub": 0.652, "corr_jud": 0.673, "corr_med": 0.577, "civlib_phys": 0.583, "civlib_priv": 0.752, "rol_jucon": 0.844, "rol_hcind": 0.672, "press_cens": 0.511, "press_harj": 0.629, "narratives": {"rol": {"en": "Following the fall of the Assad government in December 2024, Syria's new transitional authorities created commissions for transitional justice and for the missing in May 2025, but a year on, independent monitors describe progress as slow: the transitional justice commission only took possession of its Damascus offices in early 2026, and its mandate is limited to crimes committed by the former regime, excluding abuses by the new government's own predecessor militia and allied groups. The court system itself was suspended for months after Assad's fall and has only partially reactivated, with the first senior former-regime official appearing in court in April 2026.", "de": "Nach dem Sturz der Assad-Regierung im Dezember 2024 richteten Syriens neue Übergangsbehörden im Mai 2025 Kommissionen für Übergangsjustiz und für Vermisste ein, doch ein Jahr später beschreiben unabhängige Beobachter die Fortschritte als langsam: Die Kommission für Übergangsjustiz bezog ihre Büros in Damaskus erst Anfang 2026, und ihr Mandat beschränkt sich auf Verbrechen des früheren Regimes, während Verstöße der eigenen Vorgängermiliz der neuen Regierung und verbündeter Gruppen ausgeschlossen bleiben. Das Gerichtssystem selbst war nach Assads Sturz monatelang ausgesetzt und wurde erst teilweise reaktiviert; der erste hochrangige Beamte des früheren Regimes erschien im April 2026 vor Gericht."}}}, {"country": "Taiwan", "iso3": "TWN", "year": 2025, "regime_code": 3, "issue_key": "Corruption", "corr": 0.214, "civlib": 0.93, "rol": 0.961, "press": 0.838, "gini": null, "gini_year": null, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Asia", "corr_exec": 0.043, "corr_pub": 0.155, "corr_jud": 0.395, "corr_med": 0.408, "civlib_phys": 0.029, "civlib_priv": 0.07, "rol_jucon": 0.206, "rol_hcind": 0.28, "press_cens": 0.365, "press_harj": 0.371, "narratives": {}}, {"country": "Tajikistan", "iso3": "TJK", "year": 2025, "regime_code": 1, "issue_key": "Press freedom / dissent", "corr": 0.893, "civlib": 0.169, "rol": 0.128, "press": 0.043, "gini": 36.1, "gini_year": 2024, "civ_deaths": null, "civ_badness": null, "brd_deaths": 206, "brd_badness": 0.217, "region": "Asia", "corr_exec": 0.912, "corr_pub": 0.867, "corr_jud": 0.772, "corr_med": 0.861, "civlib_phys": 0.878, "civlib_priv": 0.698, "rol_jucon": 0.979, "rol_hcind": 0.78, "press_cens": 0.877, "press_harj": 0.802, "narratives": {}}, {"country": "Tanzania", "iso3": "TZA", "year": 2025, "regime_code": 1, "issue_key": "War (civilians)", "corr": 0.329, "civlib": 0.673, "rol": 0.72, "press": 0.552, "gini": 40.5, "gini_year": 2018, "civ_deaths": 1009, "civ_badness": 0.463, "brd_deaths": null, "brd_badness": null, "region": "Africa", "corr_exec": 0.206, "corr_pub": 0.24, "corr_jud": 0.585, "corr_med": 0.481, "civlib_phys": 0.272, "civlib_priv": 0.321, "rol_jucon": 0.278, "rol_hcind": 0.405, "press_cens": 0.714, "press_harj": 0.494, "narratives": {}}, {"country": "Thailand", "iso3": "THA", "year": 2025, "regime_code": 1, "issue_key": "Rule of law", "corr": 0.635, "civlib": 0.478, "rol": 0.364, "press": 0.587, "gini": 33.3, "gini_year": 2024, "civ_deaths": null, "civ_badness": null, "brd_deaths": 419, "brd_badness": 0.291, "region": "Asia", "corr_exec": 0.774, "corr_pub": 0.522, "corr_jud": 0.559, "corr_med": 0.411, "civlib_phys": 0.656, "civlib_priv": 0.465, "rol_jucon": 0.267, "rol_hcind": 0.388, "press_cens": 0.614, "press_harj": 0.424, "narratives": {"rol": {"en": "Thailand's courts operate under one of the world's strictest royal defamation laws, Section 112, which carries three to fifteen years in prison per count and has been used to prosecute over 280 people since 2020 pro-democracy protests, including a 50-year sentence for a series of Facebook posts. Courts routinely deny bail in these cases and have twice dissolved Thailand's leading progressive party over its proposals to reform the law, most recently banning ten party executives from politics in 2024. Rights groups describe the judiciary as functioning to protect the military-aligned establishment rather than to constrain it.", "de": "Thailands Gerichte operieren unter einem der weltweit strengsten Gesetze gegen Majestätsbeleidigung, Section 112, das drei bis fünfzehn Jahre Haft pro Anklagepunkt vorsieht und seit den Pro-Demokratie-Protesten 2020 gegen über 280 Personen angewendet wurde, darunter eine 50-jährige Haftstrafe für eine Reihe von Facebook-Beiträgen. Gerichte verweigern in diesen Fällen routinemäßig Kautionen und haben Thailands führende progressive Partei zweimal wegen ihrer Vorschläge zur Reform des Gesetzes aufgelöst, zuletzt 2024 mit einem Politikverbot für zehn Parteifunktionäre. Menschenrechtsgruppen beschreiben die Justiz als Instrument zum Schutz des militärnahen Establishments statt zu dessen Kontrolle."}}}, {"country": "The Gambia", "iso3": "GMB", "year": 2025, "regime_code": 2, "issue_key": "Inequality", "corr": 0.271, "civlib": 0.88, "rol": 0.901, "press": 0.814, "gini": 38.8, "gini_year": 2020, "civ_deaths": null, "civ_badness": null, "brd_dea  recognized government, courts remain nominally independent but are frequently overridden by armed factions and struggle to enforce rulings against powerful tribal or political figures.", "de": "Jemens jahrzehntelanger Bürgerkrieg hat die Justiz entlang derselben Linien gespalten wie das Staatsgebiet selbst. In von den Houthis kontrollierten Gebieten hat die Gruppe die Gerichte umstrukturiert, ernennt Richter direkt und hat die Anforderungen an das Amt auf informelle religiöse Kenntnisse gesenkt. Ein ursprünglich für Terrorismusfälle geschaffenes Sondergericht wird stattdessen genutzt, um Journalisten und Kritiker zu verfolgen. In den Gebieten der international anerkannten Regierung sind Gerichte formal unabhängig, werden aber häufig von bewaffneten Fraktionen umgangen und haben Mühe, Urteile gegen mächtige Stammes- oder Politikfiguren durchzusetzen."}}}, {"country": "Zambia", "iso3": "ZMB", "year": 2025, "regime_code": 1, "issue_key": "Inequality", "corr": 0.428, "civlib": 0.773, "rol": 0.68, "press": 0.778, "gini": 51.5, "gini_year": 2022, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Africa", "corr_exec": 0.213, "corr_pub": 0.494, "corr_jud": 0.583, "corr_med": 0.42, "civlib_phys": 0.231, "civlib_priv": 0.231, "rol_jucon": 0.29, "rol_hcind": 0.335, "press_cens": 0.434, "press_harj": 0.34, "narratives": {}}, {"country": "Zimbabwe", "iso3": "ZWE", "year": 2025, "regime_code": 1, "issue_key": "Corruption", "corr": 0.852, "civlib": 0.381, "rol": 0.435, "press": 0.414, "gini": 50.3, "gini_year": 2019, "civ_deaths": null, "civ_badness": null, "brd_deaths": null, "brd_badness": null, "region": "Africa", "corr_exec": 0.77, "corr_pub": 0.857, "corr_jud": 0.706, "corr_med": 0.582, "civlib_phys": 0.83, "civlib_priv": 0.373, "rol_jucon": 0.818, "rol_hcind": 0.635, "press_cens": 0.637, "press_harj": 0.555, "narratives": {"corr": {"en": "Zimbabwe scores 21/100 on the CPI. A 2023 Al Jazeera undercover investigation, Gold Mafia, recorded smugglers describing President Emmerson Mnangagwa as a business partner in gold and diamond smuggling networks, with his niece and the country's central-bank-linked gold refinery both implicated in laundering schemes; the US Treasury sanctioned Mnangagwa and his wife directly in March 2024 for corruption and human rights abuse. The International Crisis Group estimates Zimbabwe loses around $1.5 billion a year, some 40% of potential mining revenue, to gold smuggling alone, while anti-corruption arrests since 2017 have overwhelmingly targeted the president's political rivals rather than his own faction.", "de": "Simbabwe erreicht im CPI 21 von 100 Punkten. Eine verdeckte Al-Jazeera-Recherche (Gold Mafia, 2023) zeichnete Schmuggler auf, die Präsident Emmerson Mnangagwa als Geschäftspartner bei Gold- und Diamantenschmuggel-Netzwerken bezeichneten, wobei sowohl seine Nichte als auch die an die Zentralbank angeschlossene Goldraffinerie des Landes in Geldwäscheschemata verwickelt waren; das US-Finanzministerium sanktionierte Mnangagwa und seine Frau im März 2024 direkt wegen Korruption und Menschenrechtsverletzungen. Die International Crisis Group schätzt, dass Simbabwe allein durch Goldschmuggel jährlich rund 1,5 Milliarden US-Dollar verliert, etwa 40 % der potenziellen Bergbaueinnahmen, während sich Antikorruptions-Verhaftungen seit 2017 überwiegend gegen politische Rivalen des Präsidenten richteten, nicht gegen seine eigene Fraktion."}}}];

let lang='en', activeIssue='All', activeRegion='All', searchTerm='', activeTab='overview', mapColorMode='concern', rankField='corr';

function t(){ return UI[lang]; }

function regimeColor(code){
  return ["#a8462f","#b5793a","#6b8a3d","#2d5d5a"][code] || "#999";
}

function issueColor(key){ return dimColor(key) || "#b5793a"; }

function buildTabs(){
  const el = document.getElementById('tabs'); el.innerHTML='';
  [["overview",t().tabOverview],["browse",t().tabBrowse],["rankings",t().tabRankings]].forEach(([id,label])=>{
    const b=document.createElement('button');
    b.className='tab'+(activeTab===id?' active':'');
    b.textContent=label;
    b.onclick=()=>{ activeTab=id; renderAll(); };
    el.appendChild(b);
  });
}

function buildLegend(){
  document.getElementById('legendBtn').textContent = document.getElementById('legendPanel').classList.contains('open') ? t().legendBtnOpen : t().legendBtnClosed;
  const panel = document.getElementById('legendPanel');
  panel.innerHTML = t().legendRows.map(r=>`<div class="legend-row"><span class="legend-dim">${r[0]}</span><span class="legend-src">${r[1]}</span><span>${r[2]}</span></div>`).join('') +
    `<div class="legend-row"><span class="legend-dim">→</span><span></span><span><i>${t().legendCaveat}</i></span></div>`;
}

function buildChips(){
  const issueWrap=document.getElementById('issueChips'); issueWrap.innerHTML='';
  ["All",...DIMENSIONS.map(d=>d.key)].forEach(key=>{
    const b=document.createElement('button');
    b.className='chip'+(key===activeIssue?' active':'');
    b.textContent=t().issueNames[key]||key;
    b.onclick=()=>{ activeIssue=key; renderBrowse(); buildChips(); };
    issueWrap.appendChild(b);
  });
  const regionWrap=document.getElementById('regionChips'); regionWrap.innerHTML='';
  const regionKeys=["All",...Array.from(new Set(DATA.map(d=>d.region))).sort()];
  regionKeys.forEach(key=>{
    const b=document.createElement('button');
    b.className='chip'+(key===activeRegion?' active':'');
    b.textContent=t().regionNames[key]||key;
    b.onclick=()=>{ activeRegion=key; renderBrowse(); buildChips(); };
    regionWrap.appendChild(b);
  });
  const rankWrap=document.getElementById('rankChips'); rankWrap.innerHTML='';
  DIMENSIONS.forEach(d=>{
    const b=document.createElement('button');
    b.className='chip'+(d.field===rankField?' active':'');
    b.textContent=t().issueNames[d.key]||d.key;
    b.onclick=()=>{ rankField=d.field; renderRankings(); buildChips(); };
    rankWrap.appendChild(b);
  });
}

function renderSummary(){
  const counts={};
  DATA.forEach(d=>{ counts[d.issue_key]=(counts[d.issue_key]||0)+1; });
  const total=DATA.length;
  const bar=document.getElementById('stackBar'); bar.innerHTML='';
  const legendWrap=document.getElementById('stackLegend'); legendWrap.innerHTML='';
  DIMENSIONS.forEach(d=>{
    const n=counts[d.key]||0; if(n===0) return;
    const pct=(n/total*100);
    const seg=document.createElement('div');
    seg.className='stack-seg';
    seg.style.width=pct+'%';
    seg.style.background=d.color;
    seg.title=`${t().issueNames[d.key]}: ${n}`;
    seg.textContent = pct>7 ? n : '';
    bar.appendChild(seg);
    const li=document.createElement('div');
    li.className='stack-legend-item';
    li.innerHTML=`<span class="swatch" style="background:${d.color}"></span>${t().issueNames[d.key]} (${n})`;
    legendWrap.appendChild(li);
  });
  document.getElementById('summaryTitle').textContent = t().summaryTitle;
}

function renderMap(){
  document.getElementById('mapNote').textContent = t().mapNoteText;
  const toggle=document.getElementById('mapColorToggle'); toggle.innerHTML='';
  [["concern",t().colorByTop],["regime",t().colorByRegime]].forEach(([mode,label])=>{
    const b=document.createElement('button');
    b.className='chip'+(mapColorMode===mode?' active':'');
    b.textContent=label;
    b.onclick=()=>{ mapColorMode=mode; renderMap(); };
    toggle.appendChild(b);
  });
  const area=document.getElementById('mapArea'); area.innerHTML='';
  const byRegion={};
  DATA.forEach(d=>{ (byRegion[d.region]=byRegion[d.region]||[]).push(d); });
  const order=["Africa","Asia","Europe","America","Oceania"];
  order.filter(r=>byRegion[r]).forEach(region=>{
    const block=document.createElement('div'); block.className='continent-block';
    const label=document.createElement('div'); label.className='continent-label';
    label.textContent=`${t().regionNames[region]||region} (${byRegion[region].length})`;
    block.appendChild(label);
    const grid=document.createElement('div'); grid.className='tile-grid';
    byRegion[region].sort((a,b)=>a.country.localeCompare(b.country)).forEach(d=>{
      const tile=document.createElement('div'); tile.className='tile';
      tile.style.background = mapColorMode==='concern' ? issueColor(d.issue_key) : regimeColor(d.regime_code);
      tile.textContent = d.iso3;
      tile.title = `${d.country} — ${mapColorMode==='concern' ? (t().issueNames[d.issue_key]||d.issue_key) : (t().regimeNames[d.regime_code])}`;
      tile.onclick=()=>openModal(d);
      grid.appendChild(tile);
    });
    block.appendChild(grid);
    area.appendChild(block);
  });
}

function barRowHtml(label, pct, color, field){
  const fieldAttr = field ? ` data-field="${field}"` : '';
  const clickable = field ? ' clickable-bar' : '';
  return `<div class="bar-row${clickable}"${fieldAttr}><span class="bar-label">${label}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}

function cardBarsHtml(d, full){
  const rows=[];
  const fields = full ? ['corr','civlib','rol','press','gini','civ_badness','brd_badness'] : ['corr','civlib','rol','press'];
  fields.forEach(f=>{
    const dim=dimByField(f);
    let val=d[f];
    if(val===null||val===undefined) return;
    let displayVal = dim.invert ? val : (dim.scale100 ? val/100 : val);
    if(dim.scale100) displayVal = val/100;
    const pct=Math.round(displayVal*100);
    rows.push(barRowHtml(t().bars[f], pct, issueColor(d.issue_key), f));
  });
  return rows.join('');
}

function computeDimValues(d){
  return DIMENSIONS.map(dim=>{
    let raw=d[dim.field];
    if(raw===null||raw===undefined) return null;
    let display = dim.scale100 ? raw/100 : raw;
    if(dim.invert) display = 1-display;
    return {key:dim.key, color:dim.color, pct:Math.round(display*100), field:dim.field};
  }).filter(Boolean);
}

function openThemeModal(d, field){
  const dim = dimByField(field);
  let raw = d[field];
  let display = dim.scale100 ? raw/100 : raw;
  if(dim.invert) display = 1 - display;
  const pct = Math.round(display*100);
  const themeName = t().issueNames[dim.key] || dim.key;

  let breakdownHtml = '';
  const breakdownConfig = {
    corr: [['exec','corr_exec'],['pub','corr_pub'],['jud','corr_jud'],['med','corr_med']],
    civlib: [['phys','civlib_phys'],['priv','civlib_priv']],
    rol: [['jucon','rol_jucon'],['hcind','rol_hcind']],
    press: [['cens','press_cens'],['harj','press_harj']],
  };
  const parts = breakdownConfig[field];
  if(parts){
    const avail = parts.filter(([,f]) => d[f]!=null);
    if(avail.length){
      const rows = avail.map(([key,f])=>{
        const p = Math.round(d[f]*100);
        return `<div class="modal-bar-row"><span class="modal-bar-label">${t().breakdownParts[key]}</span><div class="modal-bar-track"><div class="modal-bar-fill" style="width:${p}%;background:${dim.color}"></div></div><span class="modal-bar-val">${p}%</span></div>`;
      }).join('');
      breakdownHtml = `<div class="modal-subhead" style="border-top:none;padding-top:0;margin-top:16px;">${t().breakdownTitle}</div>
        <p class="modal-nodata" style="margin-top:0;">${t().breakdownNote(themeName)}</p>
        <div class="modal-bars">${rows}</div>`;
    }
  }

  let narrativeHtml = '';
  if(d.narratives && d.narratives[field] && d.narratives[field][lang]){
    narrativeHtml = `<div class="modal-subhead">${lang==='de'?'Hintergrund':'Background'}</div>
      <div class="modal-explain">${d.narratives[field][lang]}</div>
      <p class="modal-nodata">${t().narrativeSourceNote}</p>`;
  }

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-country">${d.country}</div>
    <div class="modal-sub">${themeName}</div>
    <span class="modal-issue-tag" style="background:${dim.color}">${themeName} — ${pct}%</span>
    <div class="modal-bar-row" style="margin:10px 0 4px;"><span></span><div class="modal-bar-track"><div class="modal-bar-fill" style="width:${pct}%;background:${dim.color}"></div></div><span class="modal-bar-val">${pct}%</span></div>
    ${breakdownHtml}
    ${narrativeHtml}
    <button class="legend-btn" id="themeBackBtn" style="margin-top:14px;">${t().themeBack}</button>
  `;
  document.getElementById('themeBackBtn').addEventListener('click', ()=>openModal(d));
  document.getElementById('modalOverlay').classList.add('open');
}

function openModal(d){
  const vals = computeDimValues(d).sort((a,b)=>b.pct-a.pct);
  const top = vals[0];
  const second = vals[1];
  let explain = t().explainIntro(d.country, t().issueNames[top.key]||top.key, top.pct);
  if(second) explain += t().explainSecond(t().issueNames[second.key]||second.key, second.pct);

  const hasWar = d.civ_deaths!=null || d.brd_deaths!=null;
  const warIsTop = top.key.indexOf('War')===0;
  if(hasWar && !warIsTop){
    const parts=[];
    if(d.civ_deaths!=null) parts.push(t().civPart(d.civ_deaths));
    if(d.brd_deaths!=null) parts.push(t().brdPart(d.brd_deaths));
    explain += t().explainWarNote(parts.join(t().andWord));
  } else if(!hasWar){
    explain += t().explainWarNoneNote;
  }

  const barsHtml = vals.map(v=>`
    <div class="modal-bar-row clickable-modal-row" data-field="${v.field}">
      <span class="modal-bar-label">${t().issueNames[v.key]||v.key}</span>
      <div class="modal-bar-track"><div class="modal-bar-fill" style="width:${v.pct}%;background:${v.color}"></div></div>
      <span class="modal-bar-val">${v.pct}%</span>
    </div>`).join('');

  const missing = DIMENSIONS.length - vals.length;
  const giniNote = d.gini!=null ? `<p class="modal-nodata">${t().giniLine(d.gini_year)}</p>` : '';

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-country">${d.country}</div>
    <div class="modal-sub">${t().modalSub(d.year, vals.length)}${missing>0 ? ' · '+missing+' '+t().noData : ''}</div>
    <span class="modal-issue-tag" style="background:${issueColor(d.issue_key)}">${t().regimeNames[d.regime_code]} — ${t().issueNames[d.issue_key]||d.issue_key}</span>
    <div class="modal-explain">${explain}</div>
    <div class="modal-bars">${barsHtml}</div>
    ${giniNote}
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.querySelectorAll('.clickable-modal-row').forEach(row=>{
    row.addEventListener('click', ()=>openThemeModal(d, row.dataset.field));
  });
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target.id==='modalOverlay') closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

function renderBrowse(){
  const grid=document.getElementById('grid');
  const filtered=DATA.filter(d=>
    (activeIssue==='All'||d.issue_key===activeIssue) &&
    (activeRegion==='All'||d.region===activeRegion) &&
    d.country.toLowerCase().includes(searchTerm)
  );
  document.getElementById('labelIssue').textContent=t().labelIssue;
  document.getElementById('labelRegion').textContent=t().labelRegion;
  document.getElementById('search').placeholder=t().searchPlaceholder;
  document.getElementById('count').textContent=t().countTemplate(filtered.length,DATA.length);
  grid.innerHTML='';
  if(filtered.length===0){ grid.innerHTML=`<div class="empty">${t().emptyState}</div>`; return; }
  filtered.forEach(d=>{
    const card=document.createElement('div');
    card.className='card';
    card.style.borderLeftColor=issueColor(d.issue_key);
    const regimeName=t().regimeNames[d.regime_code]||'';
    const issueName=t().issueNames[d.issue_key]||d.issue_key;
    card.innerHTML=`
      <div class="card-top"><span class="country">${d.country}</span><span class="region">${t().regionNames[d.region]||d.region}</span></div>
      <div class="regime"><b>${t().regimeLabel}</b> ${regimeName} <span style="color:#a39c86;">(${d.year})</span></div>
      <span class="issue-tag">${issueName}</span>
      <div class="bars">${cardBarsHtml(d,false)}</div>
      <div class="expand-hint">${t().clickHint}</div>
    `;
    card.querySelectorAll('.clickable-bar').forEach(row=>{
      row.addEventListener('click', e=>{ e.stopPropagation(); openThemeModal(d, row.dataset.field); });
    });
    card.addEventListener('click', ()=>openModal(d));
    grid.appendChild(card);
  });
}

function renderRankings(){
  document.getElementById('labelRankBy').textContent=t().labelRankBy;
  const dim=dimByField(rankField);
  const withVal = DATA.filter(d=>d[rankField]!=null).map(d=>{
    let raw=d[rankField];
    let display = dim.scale100 ? raw/100 : raw;
    if(dim.invert) display = 1-display;
    return {d, display};
  });
  withVal.sort((a,b)=>b.display-a.display);
  const list=document.getElementById('rankList'); list.innerHTML='';
  withVal.forEach((item,i)=>{
    const row=document.createElement('div'); row.className='rank-row';
    const pct=Math.round(item.display*100);
    row.style.cursor='pointer';
    row.innerHTML=`<span class="rank-num">${i+1}</span><span class="rank-name">${item.d.country}</span>
      <div class="rank-bar-wrap"><div class="rank-track"><div class="rank-fill" style="width:${pct}%;background:${dim.color}"></div></div><span class="rank-val">${pct}</span></div>`;
    row.onclick=()=>openModal(item.d);
    list.appendChild(row);
  });
}

function renderAll(){
  document.documentElement.lang=lang;
  document.getElementById('eyebrow').textContent=t().eyebrow;
  document.getElementById('h1').textContent=t().h1;
  document.getElementById('lede').textContent=t().lede;
  document.getElementById('footer').innerHTML=t().footer;
  buildTabs();
  buildLegend();
  buildChips();
  ['overview','browse','rankings'].forEach(id=>{
    document.getElementById('view-'+id).classList.toggle('active', id===activeTab);
  });
  renderSummary();
  renderMap();
  renderBrowse();
  renderRankings();
}

document.getElementById('search').addEventListener('input', e=>{ searchTerm=e.target.value.toLowerCase(); renderBrowse(); });
document.getElementById('legendBtn').addEventListener('click', ()=>{
  document.getElementById('legendPanel').classList.toggle('open');
  buildLegend();
});
document.getElementById('langToggle').addEventListener('click', e=>{
  const b=e.target.closest('button[data-lang]'); if(!b) return;
  lang=b.dataset.lang;
  document.querySelectorAll('.lang-toggle button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  renderAll();
});

renderAll();
</script>
