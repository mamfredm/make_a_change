<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civic Pulse — V-Dem Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap');

  :root{
    --ink: #1c2b28;
    --paper: #f0ece1;
    --paper-dim: #e6e0d0;
    --teal: #2d5d5a;
    --teal-deep: #163634;
    --ochre: #b5793a;
    --rust: #a8462f;
    --purple: #6b4a8a;
    --line: #c9c0a8;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Source Sans 3', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap{ max-width: 1080px; margin: 0 auto; padding: 28px 20px 80px; }

  header{ border-bottom: 2px solid var(--ink); padding-bottom: 18px; margin-bottom: 22px; position: relative; }

  .lang-toggle{
    position: absolute; top: 0; right: 0;
    display: flex; border: 1.5px solid var(--ink); border-radius: 20px; overflow: hidden;
  }
  .lang-toggle button{
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .05em;
    padding: 6px 12px; border: none; background: transparent; color: var(--ink); cursor: pointer;
  }
  .lang-toggle button.active{ background: var(--teal-deep); color: var(--paper); }

  .eyebrow{
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--teal); margin: 0 0 6px; padding-right: 90px;
  }

  h1{
    font-family: 'Fraunces', serif; font-weight: 600; font-size: clamp(24px, 5.5vw, 40px);
    margin: 0 0 10px; line-height: 1.08; color: var(--teal-deep); padding-right: 10px;
  }

  .lede{ max-width: 700px; font-size: 14.5px; line-height: 1.55; color: #3d4a45; margin: 0; }
  .lede b{ color: var(--rust); font-weight: 600; }

  .sources{ margin-top: 12px; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #6b6455; }
  .sources span{ margin-right: 14px; display: inline-block; }

  .controls{ display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0 4px; align-items: center; }
  .control-group{ display: flex; flex-wrap: wrap; gap: 6px; }
  .control-label{ font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: #8a8272; margin-right: 4px; align-self: center; }

  .controls input[type="text"]{
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 9px 12px;
    border: 1.5px solid var(--ink); background: var(--paper); color: var(--ink);
    border-radius: 3px; flex: 1 1 200px; min-width: 160px;
  }

  .chip{
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.02em;
    padding: 6px 10px; border: 1.5px solid var(--line); background: transparent; color: var(--ink);
    border-radius: 20px; cursor: pointer; transition: all .15s ease; white-space: nowrap;
  }
  .chip:hover{ border-color: var(--teal); }
  .chip.active{ background: var(--teal-deep); border-color: var(--teal-deep); color: var(--paper); }

  .count{ font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #6b6455; margin: 14px 0 10px; }

  .grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }

  .card{
    background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--ochre);
    border-radius: 4px; padding: 12px 14px; transition: transform .12s ease, box-shadow .12s ease;
  }
  .card:hover{ transform: translateY(-2px); box-shadow: 0 6px 16px rgba(28,43,40,0.08); }

  .card-top{ display:flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .country{ font-family: 'Fraunces', serif; font-weight: 600; font-size: 16.5px; color: var(--teal-deep); }
  .region{ font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; color: #8a8272; text-transform: uppercase; letter-spacing: .06em; }
  .regime{ font-size: 11.5px; color: #55564f; margin: 5px 0 8px; }
  .regime b{ color: var(--ink); font-weight: 600; }

  .issue-tag{
    display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    padding: 3px 8px; border-radius: 20px; background: var(--paper-dim); color: var(--ink); margin-bottom: 8px;
  }

  .bars{ display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
  .bar-row{ display: flex; align-items: center; gap: 6px; }
  .bar-label{ font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #8a8272; width: 26px; flex-shrink: 0; }
  .bar-track{ flex: 1; height: 5px; background: var(--paper-dim); border-radius: 3px; overflow: hidden; }
  .bar-fill{ height: 100%; border-radius: 3px; }

  footer{
    margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--line);
    font-size: 12px; color: #6b6455; line-height: 1.6;
  }
  footer a{ color: var(--teal); }

  .empty{
    grid-column: 1/-1; text-align: center; padding: 40px 10px; color: #8a8272;
    font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  }

  @media (max-width: 480px){
    .lang-toggle{ position: static; margin-bottom: 10px; display: inline-flex; }
    .eyebrow{ padding-right: 0; }
  }
</style>
</head>

</div>

    footer: 'Quelle: <a href="https://www.v-dem.net" target="_blank">V-Dem Institute</a>, Country-Year Full+Others Datensatz, Version 16. Die Regimekategorien folgen V-Dems „Regimes of the World" (RoW) Typologie (v2x_regime). Das „Hauptproblem" ist der am schlechtesten bewertete Bereich aus Korruption, bürgerlichen Freiheiten, Rechtsstaatlichkeit und Pressefreiheit — eine Vereinfachung, kein offizieller V-Dem-Output. Wird etwa einmal jährlich aktualisiert, wenn V-Dem eine neue Version veröffentlicht; dazu das Aggregationsskript einfach erneut auf die neue CSV anwenden.',
    regimeNames: {0:"Geschlossene Autokratie", 1:"Wahlautokratie", 2:"Wahldemokratie", 3:"Liberale Demokratie"},
    issueNames: {"Corruption":"Korruption", "Civil liberties":"Bürgerliche Freiheiten", "Rule of law":"Rechtsstaatlichkeit", "Press freedom / dissent":"Pressefreiheit / Dissens", "All":"Alle"},
    regionNames: {"Africa":"Afrika","America":"Amerika","Asia":"Asien","Europe":"Europa","Oceania":"Ozeanien","All":"Alle"},
    bars: {corr:"KOR", civlib:"BF", rol:"RS", press:"PF"}
  }
};

let lang = 'en';
let activeIssue = 'All';
let activeRegion = 'All';
let searchTerm = '';

function issueColor(key){
  switch(key){
    case "Corruption": return "#b5793a";
    case "Civil liberties": return "#2d5d5a";
    case "Rule of law": return "#7a6a3a";
    case "Press freedom / dissent": return "#6b4a8a";
    default: return "#b5793a";
  }
}

function buildChips(){
  const t = UI[lang];
  const issueWrap = document.getElementById('issueChips');
  const issueKeys = ["All", ...Array.from(new Set(DATA.map(d => d.issue_key).filter(Boolean)))];
  issueWrap.innerHTML = '';
  issueKeys.forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (key === activeIssue ? ' active' : '');
    btn.textContent = t.issueNames[key] || key;
    btn.onclick = () => { activeIssue = key; buildChips(); renderCards(); };
    issueWrap.appendChild(btn);
  });

  const regionWrap = document.getElementById('regionChips');
  const regionKeys = ["All", ...Array.from(new Set(DATA.map(d => d.region).filter(Boolean))).sort()];
  regionWrap.innerHTML = '';
  regionKeys.forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (key === activeRegion ? ' active' : '');
    btn.textContent = t.regionNames[key] || key;
    btn.onclick = () => { activeRegion = key; buildChips(); renderCards(); };
    regionWrap.appendChild(btn);
  });
}

function applyStaticText(){
  const t = UI[lang];
  document.documentElement.lang = lang;
  document.getElementById('eyebrow').textContent = t.eyebrow;
  document.getElementById('h1').textContent = t.h1;
  document.getElementById('lede').innerHTML = t.lede;
  document.getElementById('sources').innerHTML = t.sources.map(s => `<span>${s}</span>`).join('');
  document.getElementById('search').placeholder = t.searchPlaceholder;
  document.getElementById('labelIssue').textContent = t.labelIssue;
  document.getElementById('labelRegion').textContent = t.labelRegion;
  document.getElementById('footer').innerHTML = t.footer;
  buildChips();
}

function renderCards(){
  const t = UI[lang];
  const grid = document.getElementById('grid');
  const filtered = DATA.filter(d =>
    (activeIssue === 'All' || d.issue_key === activeIssue) &&
    (activeRegion === 'All' || d.region === activeRegion) &&
    d.country.toLowerCase().includes(searchTerm)
  );
  document.getElementById('count').textContent = t.countTemplate(filtered.length, DATA.length);

  grid.innerHTML = '';
  if(filtered.length === 0){
    grid.innerHTML = `<div class="empty">${t.emptyState}</div>`;
    return;
  }
  filtered.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderLeftColor = issueColor(d.issue_key);
    const regimeName = t.regimeNames[d.regime_code] || d.regime;
    const issueName = t.issueNames[d.issue_key] || d.issue_key || '—';
    const barsHtml = ['corr','civlib','rol','press'].map(k => {
      let val = d[k];
      if(val === null || val === undefined) return '';
      // for corr, higher = worse, so invert for a consistent "good=long bar" feel
      const displayVal = k === 'corr' ? (1 - val) : val;
      const pct = Math.round(displayVal * 100);
      return `<div class="bar-row">
        <span class="bar-label">${t.bars[k]}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${issueColor(d.issue_key)}"></div></div>
      </div>`;
    }).join('');
    card.innerHTML = `
      <div class="card-top">
        <span class="country">${d.country}</span>
        <span class="region">${t.regionNames[d.region] || d.region}</span>
      </div>
      <div class="regime"><b>${t.regimeLabel}</b> ${regimeName} <span style="color:#a39c86;">(${d.year})</span></div>
      <span class="issue-tag">${issueName}</span>
      <div class="bars">${barsHtml}</div>
    `;
    grid.appendChild(card);
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderCards();
});

document.getElementById('langToggle').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if(!btn) return;
  lang = btn.dataset.lang;
  document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyStaticText();
  renderCards();
});

applyStaticText();
renderCards();
</script>
</body>
</html>
