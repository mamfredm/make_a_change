<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civic Pulse — A Starting Atlas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap');

  :root{
    --ink: #1c2b28;
    --paper: #f0ece1;
    --paper-dim: #e6e0d0;
    --teal: #2d5d5a;
    --teal-deep: #163634;
    --ochre: #b5793a;
    --rust: #a8462f;
    --line: #c9c0a8;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Source Sans 3', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap{ max-width: 980px; margin: 0 auto; padding: 28px 20px 80px; }

  header{ border-bottom: 2px solid var(--ink); padding-bottom: 18px; margin-bottom: 22px; position: relative; }

  .lang-toggle{
    position: absolute;
    top: 0;
    right: 0;
    display: flex;
    gap: 0;
    border: 1.5px solid var(--ink);
    border-radius: 20px;
    overflow: hidden;
  }
  .lang-toggle button{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: .05em;
    padding: 6px 12px;
    border: none;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
  }
  .lang-toggle button.active{ background: var(--teal-deep); color: var(--paper); }

  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    margin: 0 0 6px;
    padding-right: 90px;
  }

  h1{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(26px, 6vw, 44px);
    margin: 0 0 10px;
    line-height: 1.08;
    color: var(--teal-deep);
    padding-right: 10px;
  }

  .lede{
    max-width: 640px;
    font-size: 15px;
    line-height: 1.55;
    color: #3d4a45;
    margin: 0;
  }

  .lede b{ color: var(--rust); font-weight: 600; }

  .sources{
    margin-top: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #6b6455;
  }
  .sources span{ margin-right: 14px; display: inline-block; }

  .controls{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 22px 0 6px;
  }

  .controls input[type="text"]{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 9px 12px;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    border-radius: 3px;
    flex: 1 1 200px;
    min-width: 160px;
  }

  .chip{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.02em;
    padding: 7px 11px;
    border: 1.5px solid var(--line);
    background: transparent;
    color: var(--ink);
    border-radius: 20px;
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }
  .chip:hover{ border-color: var(--teal); }
  .chip.active{ background: var(--teal-deep); border-color: var(--teal-deep); color: var(--paper); }

  .count{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #6b6455;
    margin: 14px 0 10px;
  }

  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 12px;
  }

  .card{
    background: #fff;
    border: 1px solid var(--line);
    border-left: 4px solid var(--ochre);
    border-radius: 4px;
    padding: 14px 16px;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .card:hover{ transform: translateY(-2px); box-shadow: 0 6px 16px rgba(28,43,40,0.08); }

  .card-top{ display:flex; justify-content: space-between; align-items: baseline; gap: 8px; }

  .country{ font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; color: var(--teal-deep); }
  .region{ font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #8a8272; text-transform: uppercase; letter-spacing: .06em; }

  .regime{ font-size: 12.5px; color: #55564f; margin: 6px 0 8px; }
  .regime b{ color: var(--ink); font-weight: 600; }

  .issue-tag{
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--paper-dim);
    color: var(--ink);
    margin-bottom: 8px;
  }

  .note{ font-size: 12.5px; line-height: 1.45; color: #454b46; margin: 0; }

  footer{
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: #6b6455;
    line-height: 1.6;
  }
  footer a{ color: var(--teal); }

  .empty{
    grid-column: 1/-1;
    text-align: center;
    padding: 40px 10px;
    color: #8a8272;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  @media (max-width: 480px){
    .lang-toggle{ position: static; margin-bottom: 10px; display: inline-flex; }
    .eyebrow{ padding-right: 0; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="lang-toggle" id="langToggle">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="de">DE</button>
    </div>
    <p class="eyebrow" id="eyebrow"></p>
    <h1 id="h1"></h1>
    <p class="lede" id="lede"></p>
    <p class="sources" id="sources"></p>
  </header>

  <div class="controls" id="issueChips"></div>
  <div class="controls">
    <input type="text" id="search" />
  </div>

  <p class="count" id="count"></p>
  <div class="grid" id="grid"></div>

  <footer id="footer"></footer>

</div>

<script>
// ---------- UI copy, EN/DE ----------
const UI = {
  en: {
    eyebrow: "Civic Pulse — v0.1 starting atlas",
    h1: "Who governs, and what people already say about it",
    lede_pre: "A first pass at overlaying ",
    lede_b1: "regime type",
    lede_mid: " with the ",
    lede_b2: "main documented grievance",
    lede_post: " in each country — pulled from existing, publicly available research rather than opinion. This is a seed dataset for ~30 countries to test the idea, not a live feed.",
    sources: ["◆ V-Dem Institute (regime classification)", "◆ Transparency International CPI (corruption)", "◆ Freedom House (civil liberties)", "◆ Pew / World Values Survey (public sentiment)"],

    issues: {

  de: {
    eyebrow: "Civic Pulse — v0.1 Startversion",
    h1: "Wer regiert, und was die Menschen dazu sagen",
    lede_pre: "Ein erster Versuch, den ",
    lede_b1: "Regierungstyp",
    lede_mid: " mit dem ",
    lede_b2: "dokumentierten Hauptproblem",
    lede_post: " jedes Landes zu verbinden — aus bereits vorhandener, öffentlich zugänglicher Forschung, nicht aus Meinung. Dies ist ein Startdatensatz für ~30 Länder, um die Idee zu testen, keine Live-Anbindung.",
    sources: ["◆ V-Dem Institute (Regimeklassifizierung)", "◆ Transparency International CPI (Korruption)", "◆ Freedom House (bürgerliche Freiheiten)", "◆ Pew / World Values Survey (öffentliche Stimmung)"],
    searchPlaceholder: "Land suchen…",
    countTemplate: (n, total) => `${n} von ${total} Ländern angezeigt`,
    emptyState: "Keine Treffer — anderen Filter oder Suchbegriff versuchen.",
    regimeLabel: "Regierungsform:",
    footer: 'Illustrative Startauswahl, nicht vollständig oder autoritativ — Klassifizierungen vereinfachen komplexe, umstrittene Realitäten und können sich schnell ändern. Für live gepflegte Daten sind die echten Datensätze öffentlich: <a href="https://www.v-dem.net" target="_blank">v-dem.net</a>, <a href="https://www.transparency.org/en/cpi" target="_blank">transparency.org/cpi</a>, <a href="https://freedomhouse.org" target="_blank">freedomhouse.org</a>, <a href="https://worldvaluessurvey.org" target="_blank">worldvaluessurvey.org</a>. Nächster Schritt: dieses Start-Array durch einen Live-CSV-Import aus diesen Quellen ersetzen.',
    issues: {
      "War / conflict": "Krieg / Konflikt",
      "Corruption": "Korruption",
      "Press freedom / dissent": "Pressefreiheit / Dissens",
      "Inequality": "Ungleichheit",
      "Democratic backsliding": "Demokratischer Rückschritt",
      "All": "Alle"
    }
  }
};

// ---------- Country data, EN/DE ----------
// issue_key stays constant (used for filtering & border colors) — only the
// LABEL shown to the user is translated via UI[lang].issues[issue_key].
const DATA = [
  {country:{en:"United States", de:"Vereinigte Staaten"}, region:{en:"N. America", de:"Nordamerika"}, regime:{en:"Presidential democracy", de:"Präsidiale Demokratie"}, issue_key:"Democratic backsliding", note:{en:"Deep polarization, contested trust in electoral institutions, and rising inequality feature heavily in domestic surveys.", de:"Tiefe Polarisierung, umstrittenes Vertrauen in Wahlinstitutionen und wachsende Ungleichheit prägen innenpolitische Umfragen stark."}},
  {country:{en:"Russia", de:"Russland"}, region:{en:"Europe/Asia", de:"Europa/Asien"}, regime:{en:"Centralized authoritarian", de:"Zentralisiert autoritär"}, issue_key:"War / conflict", note:{en:"War in Ukraine, tight press control, and suppressed political opposition dominate independent assessments.", de:"Krieg in der Ukraine, strenge Pressekontrolle und unterdrückte politische Opposition prägen unabhängige Einschätzungen."}},
  {country:{en:"China", de:"China"}, region:{en:"Asia", de:"Asien"}, regime:{en:"One-party state", de:"Einparteienstaat"}, issue_key:"Press freedom / dissent", note:{en:"Extensive censorship and surveillance; strong state control over information and dissent.", de:"Umfassende Zensur und Überwachung; starke staatliche Kontrolle über Information und Dissens."}},
  {country:{en:"Ukraine", de:"Ukraine"}, region:{en:"Europe", de:"Europa"}, regime:{en:"Democracy (wartime)", de:"Demokratie (Kriegszustand)"}, issue_key:"War / conflict", note:{en:"Ongoing war since 2022; population directly bearing the human cost of the conflict.", de:"Andauernder Krieg seit 2022; Bevölkerung trägt die menschlichen Kosten des Konflikts unmittelbar."}},
  {country:{en:"Germany", de:"Deutschland"}, region:{en:"Europe", de:"Europa"}, regime:{en:"Parliamentary democracy", de:"Parlamentarische Demokratie"}, issue_key:"Inequality", note:{en:"Relatively stable governance; recurring debate over energy costs, migration policy, and regional inequality.", de:"Relativ stabile Regierungsführung; wiederkehrende Debatten über Energiekosten, Migrationspolitik und regionale Ungleichheit."}},
  {country:{en:"France", de:"Frankreich"}, region:{en:"Europe", de:"Europa"}, regime:{en:"Semi-presidential democracy", de:"Semi-präsidiale Demokratie"}, issue_key:"Democratic backsliding", note:{en:"Frequent mass protests over pension and economic reform; persistent distrust in political elites.", de:"Häufige Massenproteste gegen Renten- und Wirtschaftsreformen; anhaltendes Misstrauen gegenüber politischen Eliten."}},
  {country:{en:"United Kingdom", de:"Vereinigtes Königreich"}, region:{en:"Europe", de:"Europa"}, regime:{en:"Parliamentary democracy", de:"Parlamentarische Demokratie"}, issue_key:"Inequality", note:{en:"Cost-of-living pressures and regional inequality are recurring themes in public sentiment surveys.", de:"Lebenshaltungskosten und regionale Ungleichheit sind wiederkehrende Themen in Stimmungsumfragen."}},
  {country:{en:"India", de:"Indien"}, region:{en:"Asia", de:"Asien"}, regime:{en:"Federal democracy", de:"Föderale Demokratie"}, issue_key:"Press freedom / dissent", note:{en:"Freedom House and others have flagged declining press freedom rankings and communal tension in recent years.", de:"Freedom House und andere verweisen auf sinkende Pressefreiheit und zunehmende gesellschaftliche Spannungen."}},
  {country:{en:"Pakistan", de:"Pakistan"}, region:{en:"Asia", de:"Asien"}, regime:{en:"Hybrid (military-influenced)", de:"Hybrid (militärisch beeinflusst)"}, issue_key:"Corruption", note:{en:"Recurring cycles of civilian government and military influence; high perceived corruption.", de:"Wiederkehrende Zyklen aus ziviler Regierung und militärischem Einfluss; hoch wahrgenommene Korruption."}},
  {country:{en:"Myanmar", de:"Myanmar"}, region:{en:"Asia", de:"Asien"}, regime:{en:"Military junta", de:"Militärjunta"}, issue_key:"War / conflict", note:{en:"Military coup (2021) followed by ongoing civil conflict and severe human rights documentation gaps.", de:"Militärputsch (2021), gefolgt von anhaltendem Bürgerkrieg und gravierenden Lücken bei der Menschenrechtsdokumentation."}},
  {country:{en:"North Korea", de:"Nordkorea"}, region:{en:"Asia", de:"Asien"}, regime:{en:"Totalitarian", de:"Totalitär"}, issue_key:"Press freedom / dissent", note:{en:"Ranked at or near the bottom of nearly every global freedom and information-access index.", de:"Liegt in nahezu jedem globalen Freiheits- und Informationszugangsindex ganz unten."}},
  {country:{en:"Afghanistan", de:"Afghanistan"}, region:{en:"Asia", de:"Asien"}, regime:{en:"Authoritarian (Taliban)", de:"Autoritär (Taliban)"}, issue_key:"Press freedom / dissent", note:{en:"Severe restrictions on women's rights and civil liberties documented since 2021.", de:"Seit 2021 dokumentierte schwere Einschränkungen der Frauenrechte und bürgerlichen Freiheiten."}},
  {country:{en:"Iran", de:"Iran"}, region:{en:"Middle East", de:"Naher Osten"}, regime:{en:"Theocratic authoritarian", de:"Theokratisch-autoritär"}, issue_key:"Press freedom / dissent", note:{en:"Widespread protests since 2022 met with harsh crackdowns; strict information controls.", de:"Seit 2022 verbreitete Proteste, die hart niedergeschlagen wurden; strenge Informationskontrolle."}},
  {country:{en:"Saudi Arabia", de:"Saudi-Arabien"}, region:{en:"Middle East", de:"Naher Osten"}, regime:{en:"Absolute monarchy", de:"Absolute Monarchie"}, issue_key:"Press freedom / dissent", note:{en:"No elected national legislature; tightly controlled press and dissent.", de:"Kein gewähltes nationales Parlament; streng kontrollierte Presse und Opposition."}},
  {country:{en:"Israel", de:"Israel"}, region:{en:"Middle East", de:"Naher Osten"}, regime:{en:"Parliamentary democracy", de:"Parlamentarische Demokratie"}, issue_key:"War / conflict", note:{en:"Ongoing conflict with Gaza/Palestinian territories; deep domestic divisions over judicial reform.", de:"Andauernder Konflikt mit Gaza/den palästinensischen Gebieten; tiefe innenpolitische Gräben bei der Justizreform."}},
  {country:{en:"Turkey", de:"Türkei"}, region:{en:"Europe/Asia", de:"Europa/Asien"}, regime:{en:"Presidential (hybrid)", de:"Präsidial (hybrid)"}, issue_key:"Democratic backsliding", note:{en:"V-Dem and Freedom House have both noted a multi-year decline in judicial independence and press freedom.", de:"V-Dem und Freedom House verzeichnen beide einen mehrjährigen Rückgang von Justizunabhängigkeit und Pressefreiheit."}},
  {country:{en:"Venezuela", de:"Venezuela"}, region:{en:"S. America", de:"Südamerika"}, regime:{en:"Authoritarian", de:"Autoritär"}, issue_key:"Corruption", note:{en:"Severe economic crisis, mass emigration, and contested elections widely documented.", de:"Schwere Wirtschaftskrise, Massenauswanderung und umstrittene Wahlen sind breit dokumentiert."}},
  {country:{en:"Brazil", de:"Brasilien"}, region:{en:"S. America", de:"Südamerika"}, regime:{en:"Presidential democracy", de:"Präsidiale Demokratie"}, issue_key:"Inequality", note:{en:"High income inequality alongside a resilient democratic institution set, per V-Dem.", de:"Laut V-Dem hohe Einkommensungleichheit bei gleichzeitig widerstandsfähigen demokratischen Institutionen."}},
  {country:{en:"Argentina", de:"Argentinien"}, region:{en:"S. America", de:"Südamerika"}, regime:{en:"Presidential democracy", de:"Präsidiale Demokratie"}, issue_key:"Corruption", note:{en:"Recurring economic instability and corruption scandals across administrations.", de:"Wiederkehrende wirtschaftliche Instabilität und Korruptionsskandale über mehrere Regierungen hinweg."}},
  {country:{en:"Mexico", de:"Mexiko"}, region:{en:"N. America", de:"Nordamerika"}, regime:{en:"Presidential democracy", de:"Präsidiale Demokratie"}, issue_key:"Corruption", note:{en:"High-profile corruption and cartel-related violence remain top public concerns in national surveys.", de:"Prominente Korruptionsfälle und kartellbedingte Gewalt bleiben in Umfragen die größten Sorgen der Bevölkerung."}},
  {country:{en:"Nigeria", de:"Nigeria"}, region:{en:"Africa", de:"Afrika"}, regime:{en:"Federal democracy", de:"Föderale Demokratie"}, issue_key:"Corruption", note:{en:"Consistently ranks among the lower half of the Corruption Perceptions Index despite competitive elections.", de:"Liegt trotz kompetitiver Wahlen beständig in der unteren Hälfte des Korruptionswahrnehmungsindex."}},
  {country:{en:"Ethiopia", de:"Äthiopien"}, region:{en:"Africa", de:"Afrika"}, regime:{en:"Federal (dominant party)", de:"Föderal (dominante Partei)"}, issue_key:"War / conflict", note:{en:"Internal conflicts (notably Tigray, 2020–2022) with major documented humanitarian impact.", de:"Interne Konflikte (insbesondere Tigray, 2020–2022) mit großen dokumentierten humanitären Folgen."}},
  {country:{en:"South Africa", de:"Südafrika"}, region:{en:"Africa", de:"Afrika"}, regime:{en:"Parliamentary democracy", de:"Parlamentarische Demokratie"}, issue_key:"Inequality", note:{en:"One of the highest income-inequality rates globally despite strong constitutional protections.", de:"Eine der weltweit höchsten Einkommensungleichheiten trotz starker verfassungsrechtlicher Schutzmechanismen."}},
  {country:{en:"Sudan", de:"Sudan"}, region:{en:"Africa", de:"Afrika"}, regime:{en:"Civil war / contested", de:"Bürgerkrieg / umstritten"}, issue_key:"War / conflict", note:{en:"Ongoing civil war since 2023 with one of the world's largest current displacement crises.", de:"Andauernder Bürgerkrieg seit 2023 mit einer der weltweit größten aktuellen Vertreibungskrisen."}},
  {country:{en:"Egypt", de:"Ägypten"}, region:{en:"Africa", de:"Afrika"}, regime:{en:"Presidential authoritarian", de:"Präsidial-autoritär"}, issue_key:"Press freedom / dissent", note:{en:"Consistently low press freedom rankings; broad restrictions on political opposition.", de:"Durchgehend niedrige Pressefreiheit; weitreichende Einschränkungen politischer Opposition."}},
  {country:{en:"Japan", de:"Japan"}, region:{en:"Asia", de:"Asien"}, regime:{en:"Parliamentary democracy", de:"Parlamentarische Demokratie"}, issue_key:"Democratic backsliding", note:{en:"Stable democracy; public concern centers more on long-term single-party dominance and low voter turnout.", de:"Stabile Demokratie; öffentliche Sorge betrifft eher langfristige Dominanz einer Partei und niedrige Wahlbeteiligung."}},
  {country:{en:"South Korea", de:"Südkorea"}, region:{en:"Asia", de:"Asien"}, regime:{en:"Presidential democracy", de:"Präsidiale Demokratie"}, issue_key:"Democratic backsliding", note:{en:"Strong democratic institutions tested by a 2024 martial-law attempt, later reversed.", de:"Starke demokratische Institutionen wurden 2024 durch einen später zurückgenommenen Kriegsrechtsversuch auf die Probe gestellt."}},
  {country:{en:"Poland", de:"Polen"}, region:{en:"Europe", de:"Europa"}, regime:{en:"Parliamentary democracy", de:"Parlamentarische Demokratie"}, issue_key:"Democratic backsliding", note:{en:"Years of EU concern over judicial independence, partially reversed after the 2023 election.", de:"Jahrelange EU-Bedenken zur Justizunabhängigkeit, nach der Wahl 2023 teilweise rückgängig gemacht."}},
  {country:{en:"Hungary", de:"Ungarn"}, region:{en:"Europe", de:"Europa"}, regime:{en:"Hybrid regime", de:"Hybrides Regime"}, issue_key:"Democratic backsliding", note:{en:"V-Dem has downgraded Hungary from full democracy over media concentration and judicial independence concerns.", de:"V-Dem hat Ungarn wegen Mediendonzentration und Bedenken zur Justizunabhängigkeit von voller Demokratie herabgestuft."}},
  {country:{en:"Sweden", de:"Schweden"}, region:{en:"Europe", de:"Europa"}, regime:{en:"Parliamentary democracy", de:"Parlamentarische Demokratie"}, issue_key:"Inequality", note:{en:"Consistently ranks near the top of global democracy and low-corruption indices.", de:"Liegt beständig nahe der Spitze globaler Demokratie- und Korruptionsindizes."}},
];

let lang = 'en';
let activeIssue = 'All';
let searchTerm = '';

function applyStaticText(){
  const t = UI[lang];
  document.documentElement.lang = lang;
  document.getElementById('eyebrow').textContent = t.eyebrow;
  document.getElementById('h1').textContent = t.h1;
  document.getElementById('lede').innerHTML = `${t.lede_pre}<b>${t.lede_b1}</b>${t.lede_mid}<b>${t.lede_b2}</b>${t.lede_post}`;
  document.getElementById('sources').innerHTML = t.sources.map(s => `<span>${s}</span>`).join('');
  document.getElementById('search').placeholder = t.searchPlaceholder;
  document.getElementById('footer').innerHTML = t.footer;

  // rebuild issue chips with translated labels, same underlying keys
  const chipWrap = document.getElementById('issueChips');
  const issueKeys = ["All", ...Array.from(new Set(DATA.map(d => d.issue_key)))];
  chipWrap.innerHTML = '';
  issueKeys.forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (key === activeIssue ? ' active' : '');
    btn.textContent = t.issues[key] || key;
    btn.onclick = () => {
      activeIssue = key;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      renderCards();
    };
    chipWrap.appendChild(btn);
  });
}

function renderCards(){
  const t = UI[lang];
  const grid = document.getElementById('grid');
  const filtered = DATA.filter(d =>
    (activeIssue === 'All' || d.issue_key === activeIssue) &&
    d.country[lang].toLowerCase().includes(searchTerm)
  );
  document.getElementById('count').textContent = t.countTemplate(filtered.length, DATA.length);

  grid.innerHTML = '';
  if(filtered.length === 0){
    grid.innerHTML = `<div class="empty">${t.emptyState}</div>`;
    return;
  }
  filtered.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderLeftColor = colorForIssue(d.issue_key);
    card.innerHTML = `
      <div class="card-top">
        <span class="country">${d.country[lang]}</span>
        <span class="region">${d.region[lang]}</span>
      </div>
      <div class="regime"><b>${t.regimeLabel}</b> ${d.regime[lang]}</div>
      <span class="issue-tag">${t.issues[d.issue_key] || d.issue_key}</span>
      <p class="note">${d.note[lang]}</p>
    `;
    grid.appendChild(card);
  });
}

function colorForIssue(key){
  switch(key){
    case "War / conflict": return "#a8462f";
    case "Corruption": return "#b5793a";
    case "Press freedom / dissent": return "#6b4a8a";
    case "Inequality": return "#2d5d5a";
    case "Democratic backsliding": return "#7a6a3a";
    default: return "#b5793a";
  }
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderCards();
});

document.getElementById('langToggle').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if(!btn) return;
  lang = btn.dataset.lang;
  document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyStaticText();
  renderCards();
});

applyStaticText();
renderCards();
</script>
</body>
</html>
